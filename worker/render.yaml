services:
  - type: web
    name: linkright-sync-worker
    runtime: docker
    dockerfilePath: ./Dockerfile
    region: singapore
    plan: free
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: WORKER_SECRET
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: JINA_API_KEY
        sync: false
      - key: USE_NUGGETS
        value: "true"
      - key: ORACLE_BACKEND_URL
        sync: false
      - key: ORACLE_BACKEND_SECRET
        sync: false
      - key: GEMINI_API_KEY
        sync: false
    healthCheckPath: /health
