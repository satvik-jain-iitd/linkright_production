name: Worker Tests

on:
  push:
    paths:
      - 'worker/**'
  pull_request:
    paths:
      - 'worker/**'

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: worker/requirements*.txt

      - name: Install dependencies
        run: |
          pip install -r worker/requirements.txt
          pip install -r worker/requirements-test.txt

      - name: Run tests with coverage
        env:
          SUPABASE_URL: https://fake.supabase.co
          SUPABASE_KEY: fake-key
        run: |
          python -m pytest worker/tests/ \
            --cov=worker/app/tools \
            --cov-fail-under=50 \
            --cov-report=term-missing \
            --cov-report=xml \
            -v

      - name: Quality judge coverage gate
        env:
          SUPABASE_URL: https://fake.supabase.co
          SUPABASE_KEY: fake-key
        run: |
          python -m pytest worker/tests/test_quality_judge.py \
            --cov=worker/app/tools/quality_judge \
            --cov-fail-under=90 \
            --tb=short -q

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-xml
          path: coverage.xml
