name: Website CI

on:
  push:
    branches: [dev]
    paths: ['website/**']
  pull_request:
    branches: [dev, production]
    paths: ['website/**']

# Branch strategy:
#   feature/* -> PR -> dev     (preview deploy + CI)
#   dev       -> PR -> production  (CI must pass)

jobs:
  typecheck-and-build:
    name: TypeScript Check + Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: website

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: website/package-lock.json

      - run: npm ci

      - name: TypeScript type check
        run: npx tsc --noEmit

      - name: Next.js build (dry run)
        env:
          # Stubbed env vars — build must succeed without real secrets
          NEXT_PUBLIC_SUPABASE_URL: "https://placeholder.supabase.co"
          NEXT_PUBLIC_SUPABASE_ANON_KEY: "placeholder-anon-key"
          SUPABASE_SERVICE_ROLE_KEY: "placeholder-service-key"
          NEXT_PUBLIC_POSTHOG_KEY: "phc_placeholder"
          NEXT_PUBLIC_POSTHOG_HOST: "https://placeholder.posthog.com"
          RAZORPAY_KEY_ID: "rzp_placeholder"
          RAZORPAY_KEY_SECRET: "placeholder-secret"
          LANGFUSE_PUBLIC_KEY: "pk-placeholder"
          LANGFUSE_SECRET_KEY: "sk-placeholder"
          LANGFUSE_BASEURL: "https://placeholder.langfuse.com"
          JINA_API_KEY: "jina_placeholder"
          PLATFORM_GROQ_KEY: "gsk_placeholder"
          CUSTOM_GPT_SECRET: "placeholder-gpt-secret"
          ORACLE_BACKEND_URL: "https://placeholder.oracle.com"
          ORACLE_BACKEND_SECRET: "placeholder-oracle-secret"
        run: npm run build

  oracle-backend-ci:
    name: Oracle Backend Import Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: oracle-backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - run: pip install -r requirements.txt

      - name: Verify imports resolve
        env:
          NEO4J_URI: "bolt://placeholder:7687"
          NEO4J_USER: "neo4j"
          NEO4J_PASSWORD: "placeholder"
          ORACLE_SECRET: "placeholder"
          OLLAMA_BASE_URL: "http://placeholder:11434"
        run: python -c "import main; print('Oracle backend imports OK')"
