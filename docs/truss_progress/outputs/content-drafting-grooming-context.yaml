stream_name: content-drafting
stream_objective: "Design and implement multi-agent content drafting with platform-specific writers"
domain: bmad-dev
timestamp: "2026-04-08T00:00:00Z"

upstream_artifacts:
  content_brief_schema:
    source: "content-ideation/Content Brief Generator"
    path: "modules/flex/models/content_brief.py"
    contract: "ContentBrief with brief_schema_version='1.0', status='approved' triggers drafting"
    key_fields:
      - "brief_id (UUID)"
      - "angles (list[Angle], min 3)"
      - "hooks per angle (list[str], min 2)"
      - "target_platform (enum: linkedin/x/youtube/instagram/facebook)"
      - "tone (enum: professional/conversational/provocative/educational)"
      - "personal_context (list[LifeOSEntry], optional)"

scope_items:
  - id: 0
    description: "Multi-agent drafting: specialist agents per platform (LinkedIn long-form, X threads, YouTube scripts, Instagram captions, Facebook posts)"
  - id: 1
    description: "Platform-specific formatting rules (LinkedIn staircase format, X 280-char limit, YouTube description SEO)"
  - id: 2
    description: "Tone and voice consistency engine — learns user's writing style from past posts"
  - id: 3
    description: "Draft versioning with A/B variant generation"

roles:
  - po
  - designer
  - architect
  - qa

cross_stream_dependencies:
  upstream:
    - stream: content-ideation
      artifact: "briefs_store (SQLite) — ContentBrief with status='approved'"
      contract: "DraftingAgent reads briefs_store.get_approved() to trigger drafting"
  downstream:
    - stream: review-editing
      artifact: "drafts_store (SQLite) — Draft with status='ready_for_review'"
      contract: "Review agent reads drafts_store.get_pending_review()"
