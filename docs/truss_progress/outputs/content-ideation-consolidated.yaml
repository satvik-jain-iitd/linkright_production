conflicts:
  - feature: "Trend Monitor Agent"
    conflict_type: "shared_dependency"
    positions:
      architect: "EmbeddingClient instantiated inside TrendMonitorAgent"
      qa: "EmbeddingClient should be injected dependency to enable testing and avoid duplication with LifeOSConnector"
    decision: "Extract EmbeddingClient ABC to modules/flex/llm/embedding_client.py, inject as constructor dependency in both agents"
    rationale: "Avoids duplicate instantiation, enables provider-agnostic testing via mock injection, single source of truth for embedding config"
    impact: "modules/flex/llm/embedding_client.py must be created before TrendMonitorAgent and LifeOSConnector are implemented"

  - feature: "Content Brief Generator"
    conflict_type: "cross_stream_schema"
    positions:
      po: "ContentBrief schema defined in content_brief.py, owned by content-ideation"
      architect: "ContentBrief is the handoff artifact to content-drafting — schema must be versioned to prevent breaking changes"
    decision: "Add brief_schema_version='1.0' to ContentBrief model. content-drafting validates on read. QA provides shared conftest.py fixture."
    rationale: "Versioning decouples streams — content-ideation can evolve the schema while content-drafting explicitly handles version mismatches"
    impact: "content-drafting stream must import ContentBrief model and assert brief_schema_version on consume"

