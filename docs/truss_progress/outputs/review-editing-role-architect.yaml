role: architect
stream_name: review-editing

feature_analyses:
  - feature_name: "QA Review Agent"
    analysis: >
      QAReviewAgent is a pipeline of 4 independent QACheck functions, each returning
      a list[Suggestion]. No shared state between checks. Grammar check: language_tool_python
      (local JVM-based) or LanguageTool API (remote, requires API key) — make the backend
      pluggable via QABackend ABC. Readability: textstat library (FK grade, no API call).
      Brand voice: string search for avoid_words, keyword matching for prefer_words —
      pure Python, no LLM needed. Platform re-validation: re-run same validators as
      drafting agents (import from modules/flex/agents/drafting/) — DRY, not duplicated.
      qa_reports_store: same SQLite pattern with JSON payload column.
      Key decision: QA runs synchronously on the draft (not async/scheduled) — it's
      triggered by DraftingOrchestrator on draft creation and again by ReviewAgent
      before presenting to human. Two-phase: auto-QA on creation, then human-triggered
      re-QA after edits.
    tasks:
      - title: "Create QABackend ABC and implement LanguageTool + textstat backends"
        task_type: implementation
        description: >
          modules/flex/agents/qa/qa_backend.py: QABackend ABC with check_grammar(text)
          -> list[Suggestion] and check_readability(text) -> ReadabilityResult.
          LanguageToolBackend: uses language_tool_python (local) with fallback to
          LanguageTool REST API if JVM unavailable. TextstatBackend: uses textstat
          library for FK grade, also computes avg_sentence_words and syllable counts.
          Config: qa_backend enum in AgentConfig (local/api), languagetool_api_url.

      - title: "Implement QAReviewAgent pipeline with 4 parallel checks"
        task_type: implementation
        description: >
          modules/flex/agents/qa_review_agent.py. QAReviewAgent.review(draft) -> QAReport:
          Run 4 checks (grammar, readability, brand_voice, platform_constraints) using
          ThreadPoolExecutor(max_workers=4) for parallelism. Each check is independent
          — failure in one doesn't block others. Aggregate into QAReport.
          brand_voice check: load brand_voice_rules.yaml, scan for avoid_words (case-insensitive
          substring match), missing prefer_words (warn not fail), FK grade vs max_fk_grade threshold.
          platform_constraints: import validator from drafting agent (e.g., LinkedInValidator),
          re-run structural checks on draft.body.
          Update draft.status = 'qa_passed' if overall_passed else 'qa_flagged'.

      - title: "Implement qa_reports_store with SQLite backend"
        task_type: implementation
        description: >
          modules/flex/store/qa_reports_store.py. SQLite: qa_reports(id TEXT PK,
          draft_id TEXT, overall_passed INTEGER, payload TEXT, reviewed_at TEXT).
          payload=json.dumps(QAReport.model_dump()). Methods: insert(), get_by_draft_id(),
          update_suggestion_status(report_id, suggestion_id, status: accepted|ignored).
          get_by_draft_id returns most recent report for a draft_id.

      - title: "Extract platform validators from drafting agents for reuse in QA"
        task_type: implementation
        description: >
          Refactor: move structural validators (body length checks, thread validation,
          hashtag count) from platform DraftingAgent subclasses into
          modules/flex/agents/drafting/validators.py. Each validator: validate(draft) ->
          list[Suggestion]. QAReviewAgent imports and calls these directly.
          DraftingAgent subclasses also import — no duplication.

    api_contract:
      languagetool_api: >
        POST https://api.languagetoolplus.com/v2/check (or local JVM)
        Input: text, language='en-US'
        Output: matches[{offset, length, message, replacements[{value}]}]
        Mapped to Suggestion(location=CharRange(offset, offset+length), issue=message,
        recommendation=replacements[0].value if any)

    integration_points:
      - stream: "content-drafting"
        contract: "drafts_store.get_pending_review() → QAReviewAgent.review(draft) on each"
      - modules: "modules/flex/agents/drafting/validators.py"
        contract: "Shared validators imported by both DraftingAgent subclasses and QAReviewAgent"

    risks:
      - "language_tool_python requires JVM (Java) installed: Mitigate — check JVM availability at startup, fall back to LanguageTool API with configured key, log warning if neither available (QA runs without grammar check)"

  - feature_name: "Human-in-the-Loop Approval"
    analysis: >
      ApprovalGate is a thin state machine wrapper over drafts_store. The three
      transitions (ready_for_review/qa_passed/qa_flagged → approved/changes_requested/rejected)
      are enforced at the store level — no invalid transitions allowed. approved_records_store
      is a separate table for audit trail, not embedded in drafts. The platform-native
      preview reuses components from content-drafting — no reimplementation needed.
      Key constraint: publishing-orchestration must only ever see status='approved' drafts.
      This is enforced by drafts_store.get_approved() filtering strictly on status, not
      on any flag or timestamp. The approval gate is the single choke point.
    tasks:
      - title: "Implement ApprovalGate state machine with transition guards"
        task_type: implementation
        description: >
          modules/flex/agents/approval_gate.py. ApprovalGate.approve(draft_id, notes=None):
          validates current status ∈ {qa_passed, qa_flagged, ready_for_review}, updates
          status='approved', creates ApprovalRecord, returns updated Draft.
          ApprovalGate.request_changes(draft_id, notes): validates status, updates
          status='changes_requested', notes required (raise if None or empty).
          ApprovalGate.reject(draft_id, reason): validates, updates status='rejected'.
          All transitions use drafts_store.update_status() + approval_records_store.insert().

      - title: "Implement approval_records_store with audit trail"
        task_type: implementation
        description: >
          modules/flex/store/approval_records_store.py. SQLite: approval_records(id TEXT PK,
          draft_id TEXT, decision TEXT, decided_at TEXT, notes TEXT, reviewer_context TEXT).
          Methods: insert(record), get_by_draft_id(draft_id), get_all() for audit export.

    integration_points:
      - stream: "publishing-orchestration"
        contract: "drafts_store.get_approved() returns only status='approved' Drafts — strict filter"

  - feature_name: "Feedback Loop and Style Learning"
    analysis: >
      FeedbackLoopEngine runs post-approval, not during. Triggered after ApprovalGate.approve()
      if the user made inline edits before approving. Diff computation: difflib.unified_diff
      (stdlib, no dependency). Trivial edit filter: if total chars changed < 10, skip.
      LLM analysis: single Claude API call with diff + instruction to extract style_signal
      as structured JSON. Result appended to voice_corpus_path as YAML file named
      'edit_{draft_id}_{timestamp}.yaml'. VoiceConsistencyEngine picks it up on next
      refresh() automatically (cache invalidated by new file). No separate store needed —
      corpus dir is the store.
    tasks:
      - title: "Implement FeedbackLoopEngine with diff computation, trivial edit filter, and LLM style extraction"
        task_type: implementation
        description: >
          modules/flex/agents/feedback_loop_engine.py. FeedbackLoopEngine.process(original_body,
          approved_body, draft_id, platform): compute diff via difflib.SequenceMatcher,
          count chars changed. If < 10: return None (trivial). Call Claude API with diff
          and style extraction prompt → structured JSON {edit_type, style_signal}.
          Write VoiceCorpusEntry(type='user_edit', ...) as YAML to voice_corpus_path/
          edit_{draft_id}_{ts}.yaml. Return VoiceCorpusEntry.

    risks:
      - "user_edit corpus entries mixed with past posts in corpus: VoiceConsistencyEngine must handle both types — weight user_edit entries 2x (more signal-rich than generic past posts)"

completed: true
