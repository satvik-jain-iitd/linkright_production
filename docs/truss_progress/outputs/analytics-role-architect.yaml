role: architect
stream_name: analytics

feature_analyses:
  - feature_name: "Performance Tracking and Data Ingestion"
    analysis: >
      AnalyticsPoller: PlatformAnalyticsAdapter ABC with poll(platform_post_id) ->
      dict[str, int|float]. 5 concrete adapters wrapping each platform's API.
      Poll scheduling: store next_poll_at in a polling_schedule table (poll_1h, poll_24h,
      poll_7d as three rows per publish_record). AnalyticsPoller.run() iterates all rows
      where next_poll_at <= now AND status != 'completed'. metrics_store: standard SQLite
      with JSON payload for the metrics dict (platform-flexible). Rate-limit handling:
      check Retry-After header on 429, use tenacity with custom wait strategy.
    tasks:
      - title: "Create PlatformAnalyticsAdapter ABC and 5 platform adapters"
        task_type: implementation
        description: >
          modules/flex/agents/analytics/platform_analytics_adapters.py: ABC with
          poll(platform_post_id, api_credentials) -> dict[str, int|float].
          5 adapters: LinkedInAnalyticsAdapter (LinkedIn Analytics API v2 /ugcPosts/{id}/statistics),
          XAnalyticsAdapter (X API v2 /tweets/{id}?tweet.fields=public_metrics),
          YouTubeAnalyticsAdapter (YouTube Data API v3 /videos?part=statistics),
          InstagramAnalyticsAdapter (Instagram Graph API /ig_media/{id}?fields=impressions,likes,saves,comments_count),
          FacebookAnalyticsAdapter (Facebook Page Insights API /post_id/insights).
          Each catches 404 (post_deleted signal), 429 (rate limit with retry-after), auth errors.

      - title: "Implement AnalyticsPoller with 3-point scheduling and polling_schedule_store"
        task_type: implementation
        description: >
          modules/flex/agents/analytics/analytics_poller.py: AnalyticsPoller.schedule(publish_record):
          insert 3 rows into polling_schedule (poll_number=1/2/3, scheduled_at=1h/24h/7d from published_at,
          status='pending'). run(): SELECT * FROM polling_schedule WHERE scheduled_at <= now AND
          status='pending' → for each: call adapter.poll(platform_post_id), insert MetricsSnapshot,
          update polling_schedule row status='completed'. On 404: mark publish_record as post_deleted,
          mark remaining poll rows as 'cancelled'.

      - title: "Implement metrics_store with SQLite and JSON metrics payload"
        task_type: implementation
        description: >
          modules/flex/store/metrics_store.py: SQLite metrics_snapshots(id, publish_record_id,
          platform, polled_at, poll_number, metrics TEXT). metrics=json.dumps(dict). Methods:
          insert(), get_by_publish_record(id), get_latest(id), get_all_for_platform(platform),
          get_for_pattern_analysis(platform, limit=100).

  - feature_name: "Analytics Dashboard and Pattern Detection"
    analysis: >
      PatternDetectionEngine: pure function, no I/O. Takes list[MetricsSnapshot] as input,
      returns PatternResult. Pattern algorithms: (1) group snapshots by publish day-of-week +
      hour bucket, compute mean engagement_rate per bucket → best_time_window. (2) Group by
      topic keywords (extracted from Draft.platform_fields or brief topic), compute mean
      engagement per keyword cluster → top_topic. (3) Group by format type (LinkedIn long-form
      vs short, X thread length) → best_format. Minimum n=5 per platform enforced by returning
      PatternInsufficient (not raising). engagement_rate = (likes + comments + shares) / impressions.
    tasks:
      - title: "Implement PatternDetectionEngine with 3-algorithm analysis"
        task_type: implementation
        description: >
          modules/flex/agents/analytics/pattern_detection_engine.py: detect(snapshots,
          min_posts=5) -> PatternResult | PatternInsufficient. If len(snapshots) < min_posts:
          return PatternInsufficient(platform, current_count, required=5).
          Algorithm 1: time_window — group by (day_of_week, hour_bucket), mean engagement_rate.
          Algorithm 2: topic — join with brief topics via publish_record.brief_id, group by
          topic keywords (split, lowercase, filter stopwords), mean engagement.
          Algorithm 3: format — group by platform_fields structure (thread length for X,
          body length bucket for LinkedIn), mean engagement.
          Output: PatternResult(best_time_window, top_topic, best_format, insights list[str]).

  - feature_name: "Content Recommendation Engine"
    analysis: >
      RecommendationEngine is a thin synthesis layer over PatternDetectionEngine output.
      It calls detect(), interprets the top patterns, and generates natural-language
      recommendations via a single Claude API call (template + pattern data → structured
      Recommendation JSON). confidence_score is derived from: sample size (n/20, capped
      at 1.0) × pattern strength (engagement delta vs mean). recommendations_store: upsert
      by platform (replace existing recommendations on each run, not accumulate). The
      cross-stream integration with ideation: recommendations_store.get_top_n(2) returns
      top 2 by confidence_score for surfacing in 'flex ideation list'.
    tasks:
      - title: "Implement RecommendationEngine with LLM synthesis and recommendations_store"
        task_type: implementation
        description: >
          modules/flex/agents/analytics/recommendation_engine.py: generate(platform):
          call PatternDetectionEngine.detect(metrics for platform). If PatternInsufficient:
          return []. Build template with pattern data, call Claude API to generate
          3-5 Recommendation objects as structured JSON. Compute confidence_score =
          min(n_posts / 20, 1.0) × (top_pattern_engagement / avg_engagement). Store via
          recommendations_store.upsert_by_platform(platform, recs). Return recs.
          RecommendationEngine.get_for_ideation(n=2): reads recommendations_store.get_top_n(n).

completed: true
