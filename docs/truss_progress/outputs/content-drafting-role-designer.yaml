role: designer
stream_name: content-drafting

feature_analyses:
  - feature_name: "Platform-Specialist Drafting Agents"
    analysis: >
      Drafting is a background process — the primary design surface is the Draft
      card in the content pipeline view, the agent status indicator, and the
      auto-trigger notification. Users need to know: (1) a draft is being generated
      (progress state), (2) draft is ready for review (notification + badge), (3)
      what platform/brief it's for (context without opening the draft). The drafting
      view itself should present the draft in the exact visual format of the target
      platform — a LinkedIn preview looks like LinkedIn, not a generic text box.
    tasks:
      - title: "Design drafting pipeline status view and draft card component"
        task_type: design
        description: >
          UX Flow:
          1. User views Content Pipeline (Ideation → Drafting → Review → Publish)
          2. Drafting column shows cards: one per brief in drafting queue or completed
          3. Each draft card: platform icon, brief topic (truncated 2 lines), status badge
             (Queued/Drafting.../Ready), word count chip, time since created
          4. Clicking card navigates to Draft Detail view

          Component Specs:
          - Draft card: full-width, 88px, border-radius 8px, platform-colored left border
            (LinkedIn=blue, X=black, YouTube=red, Instagram=gradient-pink, Facebook=indigo)
          - Platform icon: 20px, left of card
          - Status badge: 'Queued' (gray), 'Drafting...' (amber, with animated ellipsis),
            'Ready' (green), 'Archived' (gray strikethrough)
          - Word count chip: right-aligned, 11px, bg-surface-2
          - Notification dot: 8px red dot on card when first becoming Ready

          Interaction Details:
          - Drafting... state: card shows animated gradient shimmer on left border
          - Ready state: card lifts (box-shadow adds depth) to signal actionability
          - Empty state: "No briefs approved yet. Approve a brief in Ideation to trigger drafting."
          - Error state: red border + "Draft failed — Claude API error" + Retry button

          Accessibility:
          - aria-label: "Draft for [topic] on [platform]. Status: [status]."
          - Keyboard: Tab to card, Enter to open detail

      - title: "Design platform-native draft preview views"
        task_type: design
        description: >
          5 platform-specific draft preview components that render the draft in
          the visual style of the target platform:

          LinkedIn Preview:
          - Avatar + name header (mocked), post body with staircase formatting preserved
            (blank lines render as actual paragraph breaks), character counter at bottom,
            'See more' truncation at 3 lines with expand toggle, reaction bar (mocked)
          - Container: 544px max-width (LinkedIn card width), white bg, rounded 8px border

          X Preview:
          - Thread cards: tweet[0] full-width, subsequent tweets indented 8px with
            thread line connector, each shows char count indicator (green <240, amber >240),
            280-char hard limit shown as progress arc on last character
          - Container: 598px max-width (X tweet width), dark or light mode toggle

          YouTube Preview:
          - Title at top (60-char counter), description text area with 300-char counter,
            script outline rendered as collapsible sections with timestamp badges
          - Container: standard YouTube sidebar width (400px), thumbnail placeholder

          Instagram Preview:
          - Square image placeholder (800x800), caption below with 200-char counter,
            hashtag pills rendered inline (each #tag as a purple chip), emoji count badge
          - Container: 468px max-width (Instagram post width)

          Facebook Preview:
          - Post header with avatar (mocked), body text, character counter, reaction bar
          - Container: 500px max-width (Facebook post width), no hashtag styling

          All previews:
          - Accessible via Draft Detail view tab bar: [Edit Draft] [Preview] [Compare]
          - Copy to clipboard button top-right
          - 'View on Platform' mock button (greyed, tooltip "Preview only — publish from Postiz")

  - feature_name: "Tone and Voice Consistency Engine"
    analysis: >
      VoiceProfile is abstract data — the design challenge is making it legible
      to a non-technical user. Use visual metaphors: a tone dial (4 positions:
      analytical/storytelling/provocative/educational), readability meter (FK grade
      as a simple scale from 'Very Simple' to 'Academic'), emoji frequency as a
      visual density indicator. The corpus management UI (adding past posts) is
      the onboarding flow and must be frictionless — drag-and-drop or paste.
    tasks:
      - title: "Design voice profile dashboard and corpus management UI"
        task_type: design
        description: >
          UX Flow — Voice Profile Card (in Settings or Ideation sidebar):
          1. Tone Dial: circular SVG dial with 4 labeled positions. Pointer moves to
             detected tone. Label below: "Your tone: Analytical"
          2. Readability Meter: horizontal bar, FK grade from 6 (Simple) to 16 (Academic).
             Filled to detected grade. Target zone: FK 7-9 (shaded green range).
          3. Emoji Density: row of 5 emoji icons (😊), filled = detected frequency level
             (0=none, 5=heavy). Label: "Emoji usage: Light"
          4. 'Refresh Profile' button: re-runs analysis from corpus
          5. 'Add Past Posts' CTA: opens corpus upload panel

          Corpus Upload Panel:
          - Drag-and-drop zone or text paste area for past post content
          - Each pasted/dropped post shows as a preview chip with character count
          - Platform tag selector (optional): tag each post with LinkedIn/X/etc.
          - 'Build Profile' button: disabled until at least 5 posts added
          - Progress indicator while LLM analyzes corpus

          Empty State:
          - Illustrated empty state: "Your voice profile is empty"
          - Onboarding steps: (1) Paste 5+ past posts (2) Build profile (3) Drafts sound like you
          - 'Start Adding Posts' primary CTA

          Accessibility:
          - Tone dial: aria-valuenow + aria-valuetext "Your tone is Analytical"
          - Readability meter: role=meter, aria-valuenow=FK grade, aria-valuemin=6, aria-valuemax=16

  - feature_name: "Draft Versioning and A/B Variants"
    analysis: >
      A/B comparison is a scanning task, not a reading task. The user needs to
      identify the winner quickly — not read both drafts end-to-end. Design:
      show key differentiators prominently (hook used, tone, word count) before
      showing draft bodies. Use a split-view on desktop, tab-view on mobile.
      The 'Select this version' action must be primary and irreversible-feeling
      (confirmation step) because archiving the other variant can't be undone.
    tasks:
      - title: "Design A/B draft comparison view with split layout and selection flow"
        task_type: design
        description: >
          UX Flow:
          1. User opens Draft Detail for a brief with variants → sees 'A/B Variants' badge
          2. 'Compare Variants' tab in Draft Detail view
          3. Split view: Version A (left) | Version B (right) on desktop
             Tab view: [Version A] [Version B] on mobile
          4. Each variant panel shows: version badge (A or B), hook used (quoted, highlighted),
             tone chip, word count, FK grade, platform preview (collapsed, expandable)
          5. 'Select This Version' button at bottom of each panel
          6. Confirmation modal: "Select Version [A/B]? Version [B/A] will be archived and
             moved to review." [Cancel] [Confirm Select]
          7. After selection: selected version badge turns green (✓ Selected), other grayed out

          Component Specs:
          - Split view: 50/50 on desktop >= 1280px, 100% tabs on mobile
          - Version badge: 32px circle, A=amber, B=blue
          - Hook highlight: quoted italic text, bg-surface-2, border-left 3px primary
          - 'Select This Version': full-width per panel, primary action style
          - Confirmation modal: 400px, centered, not dismissible on backdrop click

          Interaction Details:
          - Loading: skeleton split view while both variants generate (can take 20-30s)
          - Single draft (no variant yet): banner "Generate a second variant to compare"
            + 'Generate Variant B' button inline

          Accessibility:
          - aria-label on each panel: "Version A draft. Hook: [hook text]. [word count] words."
          - Confirmation modal: focus trap, Escape to cancel

completed: true
