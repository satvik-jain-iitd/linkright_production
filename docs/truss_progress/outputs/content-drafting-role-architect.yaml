role: architect
stream_name: content-drafting

feature_analyses:
  - feature_name: "Platform-Specialist Drafting Agents"
    analysis: >
      BaseDraftingAgent ABC with abstract draft(brief: ContentBrief) -> Draft method.
      5 platform subclasses — each overrides _build_prompt() and _parse_response().
      Parsing is platform-specific: LinkedIn validates char count and staircase structure,
      X validates thread length and per-tweet char count, YouTube extracts structured
      fields (title/description/script_outline) from JSON response, Instagram validates
      caption length and hashtag count, Facebook validates char count and absence of
      hashtags. DraftingOrchestrator uses a platform→agent registry (dict) for dispatch
      — no if/elif chains. All agents share a single Claude API client (injected, not
      self-instantiated) and a single DraftingPromptsRegistry.
      drafts_store is the same SQLite pattern as briefs_store: id, brief_id, platform,
      version, status, payload (JSON), created_at, updated_at.
      Key insight: each agent makes exactly 1 Claude API call per draft (no iteration).
      Response format uses JSON schema enforcement to ensure platform_fields are
      structurally correct on first call. Retry only on Pydantic validation failure.
    tasks:
      - title: "Create BaseDraftingAgent ABC and 5 platform-specialist subclasses"
        task_type: implementation
        description: >
          modules/flex/agents/drafting/base_drafting_agent.py: BaseDraftingAgent ABC.
          Abstract methods: _build_prompt(brief, voice_profile) -> str,
          _parse_response(raw) -> dict[platform_fields]. Concrete draft() method:
          call Claude API with DRAFTING_PROMPTS[platform] as system + _build_prompt as
          user, parse via _parse_response, validate with Draft Pydantic model, save to
          drafts_store, return Draft. Retry once on Pydantic fail.
          5 subclasses in separate files: LinkedIn (validates staircase + 1300-1600 chars),
          X (validates thread length 3-7, per-tweet <= 280), YouTube (extracts title/description/
          script_outline from JSON), Instagram (validates caption 125-200, hashtags 15-20),
          Facebook (validates 400-600 chars, no hashtags).

      - title: "Implement DraftingOrchestrator with platform→agent registry"
        task_type: implementation
        description: >
          modules/flex/agents/drafting/drafting_orchestrator.py.
          AGENT_REGISTRY: dict[Platform, type[BaseDraftingAgent]] = {Platform.LINKEDIN:
          LinkedInDraftingAgent, ...}. DraftingOrchestrator.__init__ takes claude_client,
          drafts_store, briefs_store, voice_engine (optional). run(): polls
          briefs_store.get_approved_undrafted(), for each brief: instantiate AGENT_REGISTRY[
          brief.target_platform](claude_client), call agent.draft(brief, voice_engine),
          catch all exceptions: log + continue. Runs on schedule (APScheduler or simple
          time-based loop).

      - title: "Implement drafts_store with SQLite backend"
        task_type: implementation
        description: >
          modules/flex/store/drafts_store.py. SQLite table: drafts(id TEXT PK, brief_id TEXT,
          platform TEXT, version INTEGER DEFAULT 1, status TEXT DEFAULT 'ready_for_review',
          payload TEXT NOT NULL, created_at TEXT, updated_at TEXT).
          Methods: insert(draft), get_by_id(id), get_pending_review(), get_approved_undrafted()
          (reads from briefs_store join), update_status(id, status), list_by_brief(brief_id),
          get_by_version(brief_id, version).

      - title: "Define Claude API call contract and JSON schema enforcement for each platform"
        task_type: implementation
        description: >
          Each platform agent uses response_format with a platform-specific JSON schema.
          LinkedIn: {body: str, call_to_action: str}.
          X: {thread: list[str]}.
          YouTube: {title: str, description: str, script_outline: list[{section: str, timestamp: str}]}.
          Instagram: {caption: str, hashtags: list[str]}.
          Facebook: {body: str}.
          All wrapped in Draft.platform_fields on parse. Schema validated by _parse_response
          before Draft Pydantic model construction.

    api_contract:
      claude_api_call: >
        POST /v1/messages
        model: claude-3-5-sonnet-20241022
        system: DRAFTING_PROMPTS[platform] + voice_instruction (if VoiceProfile)
        user: ContentBrief summary (angles, hooks, topic, personal_context)
        response_format: { type: "json_schema", schema: platform_specific_schema }
      drafts_store_contract: >
        briefs_store.get_approved_undrafted() returns list[ContentBrief] where
        status='approved' AND no drafts_store record exists for brief_id

    integration_points:
      - stream: "content-ideation"
        contract: "briefs_store.get_approved_undrafted() — reads from content-ideation's briefs_store"
      - stream: "review-editing"
        contract: "drafts_store.get_pending_review() — read by review-editing stream's ReviewAgent"

    risks:
      - "ContentBrief schema changes from content-ideation breaking DraftingAgent parsing: Mitigate — check brief.brief_schema_version at agent init, raise SchemaVersionError if unexpected version"
      - "5 agents sharing Claude API client causing rate-limit contention if orchestrator batches concurrently: Mitigate — DraftingOrchestrator runs sequentially (one brief at a time), not concurrent"

  - feature_name: "Tone and Voice Consistency Engine"
    analysis: >
      VoiceConsistencyEngine is a read-only analysis layer — it reads corpus files,
      calls Claude API once to extract VoiceProfile (batch analysis of all posts in
      a single call, not per-post), caches the result. Cache invalidation: hash of
      all file mtimes in corpus directory. VoiceProfile is injected into each
      DraftingAgent's _build_prompt() as a structured voice_instruction string
      (not raw JSON) — the agent doesn't receive the profile object directly.
      This keeps agents decoupled from VoiceProfile schema. The engine is an optional
      dependency injected into DraftingOrchestrator — if None, agents skip voice injection.
    tasks:
      - title: "Implement VoiceConsistencyEngine with corpus reader, LLM analysis, and cache"
        task_type: implementation
        description: >
          modules/flex/agents/voice_consistency_engine.py. __init__ reads all .txt/.yaml
          files from voice_corpus_path. build_profile(): concatenates all post texts (max
          5000 chars total), calls Claude API with voice analysis prompt, parses structured
          JSON response into VoiceProfile. Cache: store profile in .flex/cache/voice_profile.json
          with corpus_hash (SHA256 of all file mtimes + sizes). get_voice_instruction(platform):
          converts VoiceProfile to platform-specific instruction string injected into agent prompt.
          Refresh(): invalidate cache, rebuild on next call.

    integration_points:
      - agent: "BaseDraftingAgent subclasses"
        contract: "VoiceConsistencyEngine.get_voice_instruction(platform) -> str injected into system prompt via _build_prompt()"

    risks:
      - "Large corpus (100+ posts) causing slow profile build: Mitigate — sample max 20 most recent posts for profile analysis"

  - feature_name: "Draft Versioning and A/B Variants"
    analysis: >
      DraftVersioningEngine is a thin wrapper over DraftingAgent — it calls the agent
      twice with different angle/hook selections from the ContentBrief. Version 1 uses
      the primary angle (index 0) + brief's original tone. Version 2 uses angle index 1
      (fallback to index 0 if only 1 angle) + alternate tone (deterministic rotation:
      professional→conversational→provocative→educational). Both drafts are stored
      with version=1 and version=2 respectively. No new Claude API logic needed —
      DraftVersioningEngine just parameterizes the existing agent.
    tasks:
      - title: "Implement DraftVersioningEngine as thin wrapper over BaseDraftingAgent"
        task_type: implementation
        description: >
          modules/flex/agents/draft_versioning_engine.py. DraftVersioningEngine.__init__
          takes platform_agent (BaseDraftingAgent instance). generate_variants(brief):
          clone brief with angle_index=0 (version 1), call agent.draft(). Clone brief
          with angle_index=1 (or 0 if only 1 angle) + alternate_tone (rotation), call
          agent.draft() again. Store both with version=1 and version=2. Return
          VariantPair(v1: Draft, v2: Draft). Alternate tone rotation: Tone enum cycle.

    integration_points:
      - store: "drafts_store"
        contract: "Both variants stored with same brief_id, version=1 and version=2, status='ready_for_review'"

completed: true
