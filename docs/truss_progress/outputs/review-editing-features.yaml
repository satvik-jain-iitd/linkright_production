stream_name: review-editing

features:
  - name: "QA Review Agent"
    priority: p1
    description: >
      QAReviewAgent runs automated quality checks on every draft before presenting
      to the human reviewer. Checks: (1) grammar and spelling via language_tool_python
      or LanguageTool API, (2) readability score targeting FK Grade 7 (flags if > 9),
      (3) brand voice compliance — checks against a configured brand_voice_rules.yaml
      (tone keywords to include/avoid, sentence structure preferences), (4) platform
      constraint re-validation (re-runs the same checks as the drafting agent to catch
      any post-edit regressions). Outputs a QAReport with pass/fail per check and
      specific line-level suggestions.
    scope_items_covered: [0]
    stories:
      - title: "As a content creator, I want automated quality checks on my draft so I catch grammar, readability, and brand voice issues before I review"
        description: >
          QAReviewAgent runs 4 checks and produces a QAReport. Each check has a pass/fail
          status and a list of Suggestion objects (location, issue, recommendation).
          QAReport is stored alongside the Draft in a qa_reports_store.
        acceptance_criteria:
          - "Given a draft with 2 grammar errors, When QAReviewAgent.review() is called, Then QAReport.grammar.passed=False and QAReport.grammar.suggestions contains 2 items, each with location (char range), issue description, and recommendation"
          - "Given a draft with FK Grade 11 (above target of 7), When QAReviewAgent.review() is called, Then QAReport.readability.passed=False and QAReport.readability.fk_grade=11.0, suggestions include specific long sentences to simplify"
          - "Given brand_voice_rules.yaml specifies avoid=['jargon', 'synergy'], When QAReviewAgent.review() a draft containing 'synergy', Then QAReport.brand_voice.passed=False and suggestion identifies the offending word + recommended alternative"
          - "Given a draft that passes all 4 checks, When QAReviewAgent.review() is called, Then QAReport.overall_passed=True and draft status updated to 'qa_passed'"
          - "Given a draft that fails any check, When QAReviewAgent.review() is called, Then QAReport.overall_passed=False and draft status updated to 'qa_flagged'"

      - title: "As a content creator, I want to see QA suggestions inline in the draft view so I can decide whether to accept or ignore each one"
        description: >
          QA suggestions are rendered inline in the draft editor as underlined spans
          (grammar=red, readability=amber, brand_voice=purple). Hovering shows the
          suggestion tooltip with 'Accept' and 'Ignore' actions.
        acceptance_criteria:
          - "Given QAReport with 3 grammar suggestions, When draft review view opens, Then 3 red underlined spans appear at the correct character offsets in the draft body"
          - "Given user clicks 'Accept' on a grammar suggestion, When accepted, Then the draft body is updated with the recommended fix, suggestion span removed, and QAReport.grammar.accepted_count incremented"
          - "Given user clicks 'Ignore' on a suggestion, When ignored, Then the span is removed from view (no longer highlighted) but draft body is unchanged, and QAReport stores the ignored suggestion"
    files_affected:
      - "modules/flex/agents/qa_review_agent.py"
      - "modules/flex/models/qa_report.py"
      - "modules/flex/store/qa_reports_store.py"
      - "modules/flex/config/brand_voice_rules.yaml"
      - "modules/flex/cli/review_commands.py"
    dependencies: []

  - name: "Human-in-the-Loop Approval"
    priority: p1
    description: >
      Mandatory human approval checkpoint before any draft proceeds to publishing.
      ApprovalGate presents the draft in platform-native preview, shows QA report summary,
      and requires explicit user action: Approve (proceed to publishing), Request Changes
      (return to drafting with notes), or Reject (archive draft). Nothing is published
      without an Approve action. Approval is stored with timestamp and (optionally)
      user notes for audit trail.
    scope_items_covered: [2, 1]
    stories:
      - title: "As a content creator, I want to see my draft exactly as it will appear on the platform before I approve it so I can catch visual formatting issues"
        description: >
          ApprovalGate presents the draft in a platform-native preview (using the same
          preview components as content-drafting) alongside the QA report summary.
          User must take one of three explicit actions before the draft can proceed.
        acceptance_criteria:
          - "Given a draft with status='qa_passed', When the user opens the approval view, Then the draft is rendered in the platform-native preview component (LinkedIn staircase, X thread, etc.) with a QA summary bar showing pass/fail counts"
          - "Given user clicks 'Approve', When confirmed, Then draft status updated to 'approved', approved_at timestamp stored, and draft becomes available to publishing-orchestration stream"
          - "Given user clicks 'Request Changes' with notes 'Make the hook more punchy', When submitted, Then draft status updated to 'changes_requested', notes stored, and a task is created to notify the user that the draft needs revision"
          - "Given user clicks 'Reject', When confirmed, Then draft status updated to 'rejected', rejection reason stored, and draft is permanently excluded from publishing queue"
          - "Given a draft with status='qa_flagged', When the user opens the approval view, Then a prominent warning banner shows: 'This draft has QA issues. Review before approving.' with count of unresolved suggestions"

      - title: "As a content creator, I want an approval queue showing all drafts awaiting my review so I can process them efficiently"
        description: >
          Approval queue view lists all drafts needing review with age, platform, QA
          status, and quick-approve action for drafts that passed all QA checks.
        acceptance_criteria:
          - "Given 5 drafts pending review, When approval queue is opened, Then all 5 are listed with columns: platform icon, topic, QA status (passed/flagged), age, word count"
          - "Given a draft with QAReport.overall_passed=True, When shown in queue, Then a 'Quick Approve' button is visible (single-click approve without opening full view)"
          - "Given user clicks 'Quick Approve', When confirmed, Then draft status='approved' without opening the full approval view"
    files_affected:
      - "modules/flex/agents/approval_gate.py"
      - "modules/flex/store/drafts_store.py"
      - "modules/flex/models/approval_record.py"
      - "modules/flex/cli/review_commands.py"
    dependencies:
      - "QA Review Agent"

  - name: "Feedback Loop and Style Learning"
    priority: p2
    description: >
      FeedbackLoopEngine captures user edits made during the approval stage (diff between
      original draft and approved version) and converts them into style learning signals.
      Edit patterns (word substitutions, sentence restructures, additions/deletions) are
      analysed by an LLM to extract style preferences and appended to the voice corpus
      as 'user_edit' entries. These feed back into VoiceConsistencyEngine on next profile
      rebuild, progressively improving draft quality without explicit user training effort.
    scope_items_covered: [3]
    stories:
      - title: "As a content creator, I want my editing corrections to automatically improve future drafts so the AI learns my style without me having to teach it explicitly"
        description: >
          FeedbackLoopEngine diffs the original draft against the user-approved version.
          Non-trivial edits (> 10 chars changed) are sent to LLM for style signal extraction.
          Result is appended to voice_corpus_path as a .yaml edit record.
        acceptance_criteria:
          - "Given user edits a draft body (changing 'utilize' to 'use', restructuring a sentence), When user approves the edited draft, Then FeedbackLoopEngine captures the diff and creates a voice corpus entry with type='user_edit', original_text, edited_text, and edit_type (word_sub/restructure/addition/deletion)"
          - "Given diff has < 10 chars changed (minor punctuation fix), When FeedbackLoopEngine processes it, Then no corpus entry is created (trivial edit threshold not met)"
          - "Given 3 user_edit corpus entries exist, When VoiceConsistencyEngine.refresh() is called, Then the edit entries are included in profile analysis (counted in corpus_post_count)"

      - title: "As a content creator, I want to see what style patterns the AI learned from my edits so I can verify the feedback loop is working"
        description: >
          'flex voice edits' CLI shows recent user_edit corpus entries with the detected
          style signal each produced, and the aggregate pattern trend over time.
        acceptance_criteria:
          - "Given 5 user_edit entries in corpus, When 'flex voice edits' run, Then CLI shows table: date, edit_type, original snippet (20 chars), edited snippet (20 chars), style_signal detected"
          - "Given 0 user_edit entries, When 'flex voice edits' run, Then message: 'No edits recorded yet. Edit and approve a draft to start learning your style.'"
    files_affected:
      - "modules/flex/agents/feedback_loop_engine.py"
      - "modules/flex/models/voice_corpus_entry.py"
      - "modules/flex/cli/voice_commands.py"
      - "modules/flex/config/agent_config.py"
    dependencies:
      - "Human-in-the-Loop Approval"

coverage_map:
  "QA agent for grammar, readability, and brand voice compliance": "QA Review Agent"
  "Pixel-perfect preview rendering per platform before approval": "Human-in-the-Loop Approval"
  "Human-in-the-loop approval checkpoint": "Human-in-the-Loop Approval"
  "Feedback loop: user edits feed back into the style model": "Feedback Loop and Style Learning"
