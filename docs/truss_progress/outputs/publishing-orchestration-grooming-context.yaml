stream_name: publishing-orchestration
stream_objective: "Design and implement Postiz-based publishing, scheduling, and multi-agent orchestration layer"
domain: bmad-dev
timestamp: "2026-04-08T00:00:00Z"

upstream_artifacts:
  draft_contract:
    source: "review-editing/Human-in-the-Loop Approval"
    path: "modules/flex/models/draft.py"
    contract: "drafts_store.get_approved() returns Drafts with status='approved'"

scope_items:
  - id: 0
    description: "Postiz integration for cross-platform publishing (LinkedIn, X, YouTube, Instagram, Facebook)"
  - id: 1
    description: "Intelligent scheduling: optimal posting times per platform based on audience analytics"
  - id: 2
    description: "Queue management with drag-and-drop reordering"
  - id: 3
    description: "Auto-retry on publish failures with notification"
  - id: 4
    description: "Coordinator agent that routes work through pipeline stages"
  - id: 5
    description: "Parallel agent execution where stages are independent"
  - id: 6
    description: "Agent-to-agent communication via message passing"
  - id: 7
    description: "Checkpoint system: each stage produces artifacts the next stage consumes"
  - id: 8
    description: "Error handling: failed agent tasks get retried or escalated to human"

cross_stream_dependencies:
  upstream:
    - stream: review-editing
      artifact: "drafts_store — Draft with status='approved'"
      contract: "PublishingOrchestrator reads drafts_store.get_approved()"
  downstream:
    - stream: analytics
      artifact: "publish_records_store — PublishRecord with published_at, platform_post_id"
      contract: "AnalyticsEngine reads publish_records to poll platform APIs for engagement data"
