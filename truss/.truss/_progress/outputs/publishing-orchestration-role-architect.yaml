role: architect
stream_name: publishing-orchestration

feature_analyses:
  - feature_name: "Postiz Publishing Integration"
    analysis: >
      PostizChannelAdapter: one adapter per platform, each implements adapt(draft) ->
      PostizPayload. Postiz payload format: {channel_id, content, scheduled_at,
      media (optional — YouTube thumbnail, Instagram image)}. PostizPublisher wraps
      the Postiz REST API client (requests library). Retry logic: use tenacity library
      with @retry decorator (stop=stop_after_attempt(3), wait=wait_exponential(min=2, max=8),
      retry=retry_if_not_exception_type(PostizAuthError)). publish_records_store: standard
      SQLite pattern. Key design: PostizPublisher.publish() is synchronous and blocking —
      the orchestrator is responsible for running it in a thread pool if parallelism needed.
    tasks:
      - title: "Implement PostizPublisher with Postiz REST API client and tenacity retry"
        task_type: implementation
        description: >
          modules/flex/agents/publishing/postiz_publisher.py: PostizPublisher.__init__ takes
          PostizConfig + requests.Session (injected for testability). publish(draft, scheduled_at):
          call adapter.adapt(draft) → PostizPayload, POST to {base_url}/api/v1/posts.
          @retry decorator: 3 attempts, exponential backoff [2,4,8]s, retry_if_not_exception_type
          (PostizAuthError). On success: return PostizResponse(post_id, scheduled_at, status).
          On 401: raise PostizAuthError immediately. On 5xx/timeout: raise PostizServerError,
          let retry handle.

      - title: "Create PostizChannelAdapter ABC and 5 platform adapters"
        task_type: implementation
        description: >
          modules/flex/agents/publishing/postiz_channel_adapter.py: PostizChannelAdapter ABC
          with adapt(draft) -> PostizPayload. PostizPayload: channel_id, content, scheduled_at,
          media_url (optional). 5 adapters: LinkedInAdapter (content=body, no media),
          XAdapter (content=thread as line-joined string or Postiz thread format),
          YouTubeAdapter (content=description, title as metadata, thumbnail_url optional),
          InstagramAdapter (content=caption + '\n\n' + hashtags joined),
          FacebookAdapter (content=body). Each adapter reads channel_ids[platform] from PostizConfig.

      - title: "Implement publish_records_store and PublishFailureNotifier"
        task_type: implementation
        description: >
          modules/flex/store/publish_records_store.py: SQLite publish_records(id, draft_id,
          platform, platform_post_id, scheduled_at, published_at, status). Methods: insert(),
          get_by_draft_id(), get_published_without_analytics(), update_status().
          modules/flex/agents/publishing/publish_failure_notifier.py: notify(draft, error):
          prints structured CLI alert. If AgentMail configured (AGENTMAIL_INBOX env),
          sends message via AgentMail API with draft_id, platform, error_type, failed_at.

  - feature_name: "Intelligent Scheduling Engine"
    analysis: >
      SchedulingEngine is a pure function: (platform, timezone, historical_data?) ->
      datetime. No I/O, fully testable. PLATFORM_WINDOWS is a module-level constant.
      Historical override: if publish_records_store has >= 5 records for the platform,
      SchedulingEngine queries for the hour bucket with highest avg engagement_rate,
      uses that as the optimal window. Timezone conversion: use pytz or zoneinfo (stdlib 3.9+).
      Queue reorder: 'flex publish queue reorder <id> --before <other_id>' computes
      scheduled_at = other_id.scheduled_at - timedelta(minutes=5).
    tasks:
      - title: "Implement SchedulingEngine with platform windows, historical override, and timezone support"
        task_type: implementation
        description: >
          modules/flex/agents/publishing/scheduling_engine.py: compute_optimal_time(platform,
          timezone, historical_data=None): if historical_data and len >= 5, compute best_hour_bucket
          from engagement data; else use PLATFORM_WINDOWS[platform]. Convert next occurrence to
          user's timezone via zoneinfo.ZoneInfo(timezone). Returns tz-aware datetime.
          SchedulingEngine.get_historical_window(platform, metrics_store): query metrics_store
          for platform posts, group by publish hour, return hour with max avg engagement_rate.

  - feature_name: "Pipeline Coordinator Agent"
    analysis: >
      PipelineCoordinator runs a polling loop (asyncio event loop or threaded loop) over
      all stores, detecting state transitions. State machine: for each item, current status
      determines the next agent to invoke. Uses an in-process EventBus (simple pub/sub via
      collections.defaultdict of callbacks) — no external infrastructure. Each stage registers
      as a subscriber for the previous stage's completion event. Quarantine: item added to
      a quarantine_set, no further processing, checkpoint written. Parallel publishing:
      ThreadPoolExecutor(max_workers=3) for concurrent PostizPublisher calls.
    tasks:
      - title: "Implement PipelineCoordinator with state machine, EventBus, and parallel publishing"
        task_type: implementation
        description: >
          modules/flex/agents/pipeline_coordinator.py: PipelineCoordinator polls all stores
          on a tick (configurable, default 60s). For each item detected with a new status:
          emit event to EventBus, registered handler invokes next agent. Handlers registered:
          brief_approved → DraftingOrchestrator.run_for(brief), draft_ready_for_review →
          QAReviewAgent.review(draft), draft_approved → SchedulingEngine + PostizPublisher
          (via ThreadPoolExecutor). Unhandled exceptions: write PipelineCheckpoint(status='error'),
          add to quarantine_set, call PublishFailureNotifier.

      - title: "Implement EventBus and checkpoints_store"
        task_type: implementation
        description: >
          modules/flex/agents/message_bus.py: EventBus with publish(event_type, payload) and
          subscribe(event_type, callback). Uses threading.Lock for thread-safe callback dispatch.
          No external dependencies.
          modules/flex/store/checkpoints_store.py: SQLite pipeline_checkpoints(id, brief_id,
          draft_id, stage, status, input_status, output_status, agent_used, started_at,
          completed_at, error_type, error_detail). Methods: insert(), get_by_brief_id(),
          get_errors().

    risks:
      - "Polling loop misses a state transition if two transitions happen within one tick: Mitigate — record last_seen_status per item in a coordinator state dict, compare on each tick"
      - "ThreadPoolExecutor publishing 3 concurrent Postiz calls hitting rate limits: Mitigate — add per-platform rate limit tracking, delay submission if limit approached"

completed: true
