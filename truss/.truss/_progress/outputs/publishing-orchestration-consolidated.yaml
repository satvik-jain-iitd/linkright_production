conflicts:
  - feature: "Pipeline Coordinator Agent"
    conflict_type: "polling_race_condition"
    positions:
      architect: "PipelineCoordinator polls all stores on a tick and dispatches agents — potential for duplicate dispatch if tick overlaps"
      qa: "polling_schedule rows must be marked 'in_progress' during processing to prevent duplicate invocations"
    decision: "PipelineCoordinator uses optimistic locking: UPDATE polling_schedule SET status='in_progress' WHERE status='pending' AND id=? before dispatching. Only processes rows it successfully claimed. status='in_progress' rows are skipped on next tick."
    rationale: "SQLite UPDATE is atomic. This pattern (claim before process) is the standard way to prevent duplicate processing in single-writer SQLite schedulers without external locking."
    impact: "polling_schedule table needs 'in_progress' status variant. PipelineCoordinator.run() must use claim-then-process pattern for all store queries."

