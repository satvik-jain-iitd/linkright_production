features:
  - name: "Postiz Publishing Integration"
    priority: p1
    integration_notes: "Roles: po (PostizConfig model, PublishRecord schema, failure notification spec, flex publish CLI commands), architect (PostizPublisher with tenacity retry, PostizChannelAdapter ABC + 5 platform adapters, publish_records_store, PublishFailureNotifier with AgentMail support), designer (publish confirmation toast, failure alert banner, publish history table), qa (retry logic tests with requests_mock, no-retry-on-401, adapter content mapping per platform, publish_records round-trip, analytics contract test). Input: drafts_store.get_approved(). Output: publish_records_store → analytics stream polls platform_post_id."
    stories:
      - title: "As a content creator, I want approved drafts published to the correct platform via Postiz so I don't have to manually post on each network"
        acceptance_criteria:
          - "Given approved LinkedIn draft, When PostizPublisher.publish() called, Then POST to Postiz /api/v1/posts with correct channel_id, content, and scheduled_at. platform_post_id stored in publish_records_store"
          - "Given Postiz returns 5xx error, When PostizPublisher.publish() called, Then retries 3 times with backoff [2s, 4s, 8s], then sets draft.status='publish_failed', triggers notification"
          - "Given draft published successfully, When response received, Then PublishRecord created with draft_id, platform, platform_post_id, published_at, scheduled_at"
          - "Given Postiz returns 401 Unauthorized, When PostizPublisher.publish() called, Then PostizAuthError raised immediately (no retry), channel_id logged"
        tasks:
          - title: "Implement PostizPublisher with tenacity retry (3 attempts, backoff [2,4,8]s, no-retry-on-401)"
            task_type: implementation
            source_role: architect
            description: "modules/flex/agents/publishing/postiz_publisher.py: @retry decorator (stop_after_attempt(3), wait_exponential(min=2,max=8), retry_if_not_exception_type(PostizAuthError)). POST {base_url}/api/v1/posts. 401→PostizAuthError, 5xx→PostizServerError. On success: return PostizResponse(post_id, scheduled_at). On exhaustion: raise last error."

          - title: "Create PostizChannelAdapter ABC and 5 platform adapters"
            task_type: implementation
            source_role: architect
            description: "PostizChannelAdapter ABC with adapt(draft) -> PostizPayload. LinkedIn (body as content), X (thread joined), YouTube (description as content, title as metadata), Instagram (caption + '\\n\\n' + hashtags joined), Facebook (body, no hashtags). Each reads channel_ids[platform] from PostizConfig."

          - title: "Implement publish_records_store and PublishFailureNotifier with AgentMail"
            task_type: implementation
            source_role: architect
            description: "publish_records_store: SQLite publish_records(id, draft_id, platform, platform_post_id, scheduled_at, published_at, status). get_published_without_analytics() for analytics handoff. PublishFailureNotifier.notify(draft, error): CLI alert with platform/topic/error_type/retry_command. If AGENTMAIL_INBOX configured: send structured message."

          - title: "Define PostizConfig, PublishRecord Pydantic models and publish CLI commands"
            task_type: implementation
            source_role: po
            description: "PostizConfig: postiz_api_key, postiz_base_url, channel_ids dict, retry_attempts=3, retry_backoff=[2,4,8]. PublishRecord: record_id UUID, draft_id, platform, platform_post_id, scheduled_at, published_at, status enum. CLI: flex publish queue/cancel/retry/history commands."

          - title: "Design publish confirmation toast, persistent failure alert, and publish history view"
            task_type: design
            source_role: designer
            description: "Confirmation toast (4s, bottom-right, 320px): platform icon + 'Queued for [Platform]' + scheduled_at local time + [View Queue]. Failure alert (persistent, top-center): red-50 banner, platform/topic/error, [Retry] primary, [Dismiss] text. History table: date/platform icon/topic/status badge/platform_post_id truncated link."

          - title: "Write unit tests for PostizPublisher retry, no-retry-on-401, and channel adapters"
            task_type: test
            source_role: qa
            description: "Retry: 500→500→200 = 3 calls success; 3x500 = publish_failed; 401 = 1 call PostizAuthError. Backoff delays [2,4,8]s verified. Adapters: LinkedIn body, X thread format, Instagram caption+hashtags, YouTube description, Facebook no hashtags. publish_records round-trip. get_published_without_analytics contract test."

      - title: "As a content creator, I want to be notified when a publish fails so I can take action before the post window closes"
        acceptance_criteria:
          - "Given draft fails all 3 retries, When publish_failed set, Then notification contains platform name, brief topic, error type, and retry command"
          - "Given AgentMail configured, When publish fails, Then message sent to configured inbox with draft_id, platform, error_type, failed_at"
          - "Given multiple drafts fail, When notifications sent, Then each failure produces separate notification"
        tasks:
          - title: "Write integration tests for PublishFailureNotifier and separate-per-failure contract"
            task_type: test
            source_role: qa
            description: "CLI notification contains all required fields. AgentMail sent when AGENTMAIL_INBOX set (mock API). 3 failures → notify() called 3 times (not batched). Failure notifier called after quarantine in PipelineCoordinator."

  - name: "Intelligent Scheduling Engine"
    priority: p1
    integration_notes: "Roles: po (platform scheduling windows constants, timezone config in AgentConfig, queue reorder/cancel CLI), architect (SchedulingEngine pure function with historical override at 5+ posts, zoneinfo timezone conversion, claim-before-process pattern in coordinator), designer (schedule confirmation card with recommended time, timeline queue view grouped by day), qa (per-platform window tests, historical override threshold, timezone midnight boundary, queue cancel calls Postiz DELETE). Input: approved draft + user timezone. Output: scheduled_at datetime → PostizPublisher."
    stories:
      - title: "As a content creator, I want my posts scheduled at the optimal time for each platform so I maximize reach without researching posting times"
        acceptance_criteria:
          - "Given platform='linkedin', no historical data, When SchedulingEngine.compute_optimal_time() called, Then returns next Tue/Wed/Thu between 08:00-10:00 in user's timezone"
          - "Given platform='x', no historical data, When called, Then returns next weekday 09:00-10:00 or 19:00-21:00"
          - "Given historical analytics with LinkedIn posts peaking at 07:30, When compute_optimal_time('linkedin') called, Then returns 07:30 (historical overrides default)"
          - "Given user runs 'flex publish schedule <draft_id> --at 2026-04-10T09:00', When override saved, Then scheduled_at set to specified datetime"
        tasks:
          - title: "Implement SchedulingEngine with platform windows constants, historical override (>=5 posts), and zoneinfo timezone support"
            task_type: implementation
            source_role: architect
            description: "PLATFORM_WINDOWS dict per platform. compute_optimal_time(platform, timezone, historical_data=None): if historical_data >= 5, compute best_hour_bucket from engagement; else use PLATFORM_WINDOWS. zoneinfo.ZoneInfo(timezone) for conversion. Returns tz-aware datetime of next optimal occurrence."

          - title: "Define platform scheduling windows, timezone AgentConfig field, and queue management CLI"
            task_type: implementation
            source_role: po
            description: "PLATFORM_WINDOWS: LinkedIn (Tue/Wed/Thu 08:00-10:00), X (any weekday 09:00-10:00 or 19:00-21:00), YouTube (Fri/Sat 15:00-17:00), Instagram (Mon/Wed/Fri 11:00-13:00), Facebook (Wed/Thu 13:00-15:00). user_timezone in AgentConfig. CLI: flex publish queue (timeline view), queue reorder <id> --before <other_id>, cancel <draft_id>."

          - title: "Design schedule confirmation card and publishing queue timeline view"
            task_type: design
            source_role: designer
            description: "Schedule confirmation inline in approval footer: '📅 Recommended: [day] [date] at [time] ([Platform] peak time)' + [Change Time] datetime picker. Queue timeline: vertical, day-grouped, platform icon + time badge + topic + status chip. Today section highlighted. [Cancel] on hover, [Reschedule] opens datetime picker. Empty state."

      - title: "As a content creator, I want to see and reorder my publishing queue so I can control what goes out and when"
        acceptance_criteria:
          - "Given 4 drafts scheduled, When 'flex publish queue' run, Then all 4 shown sorted by scheduled_at with platform, topic, scheduled_at, status"
          - "Given 'flex publish queue reorder <id> --before <other_id>', When executed, Then draft's scheduled_at set to 5 minutes before other_id's scheduled_at"
          - "Given 'flex publish cancel <draft_id>', When confirmed, Then status='cancelled', removed from Postiz queue via DELETE API"
        tasks:
          - title: "Write unit tests for SchedulingEngine: per-platform windows, historical threshold, timezone boundary"
            task_type: test
            source_role: qa
            description: "LinkedIn default Tue/Wed/Thu window, X dual window (09:00 or 19:00), historical override at exactly 5 posts (not 4), timezone conversion to IST/PST/etc, midnight boundary (optimal window near UTC midnight → correct local day), override stored (SchedulingEngine not called), queue cancel calls Postiz DELETE."

  - name: "Pipeline Coordinator Agent"
    priority: p1
    integration_notes: "Roles: po (PipelineCheckpoint model, pipeline CLI log/run/status commands), architect (PipelineCoordinator state machine with EventBus, claim-before-process optimistic locking, ThreadPoolExecutor max_workers=3 for parallel publishing, quarantine_set), designer (pipeline status board with horizontal stage flow + active items, per-brief audit timeline), qa (quarantine test, parallel 3-concurrent limit, EventBus thread safety, claim prevents duplicate dispatch, full pipeline log audit). The coordinator ties together all other agents — it's the runtime glue of the entire Flex pipeline."
    stories:
      - title: "As a content creator, I want the pipeline to automatically move content through each stage so I only need to act at approval checkpoints"
        acceptance_criteria:
          - "Given ContentBrief transitions to status='approved', When PipelineCoordinator detects it, Then DraftingOrchestrator triggered within poll interval"
          - "Given Draft transitions to status='ready_for_review', When detected, Then QAReviewAgent triggered automatically"
          - "Given Draft transitions to status='approved' (post-human-approval), When detected, Then SchedulingEngine + PostizPublisher triggered in sequence"
          - "Given 3 approved drafts exist simultaneously, When coordinator runs, Then all 3 dispatched in parallel (max 3 concurrent)"
          - "Given any stage raises unhandled exception, When coordinator catches it, Then PipelineCheckpoint(status='error') written, item quarantined, notification sent"
        tasks:
          - title: "Implement PipelineCoordinator with state machine, optimistic locking, and parallel publishing"
            task_type: implementation
            source_role: architect
            description: "PipelineCoordinator.run(): claim-before-process (UPDATE status='in_progress' WHERE status='pending'), dispatch handlers via EventBus. Handlers: brief_approved → DraftingOrchestrator, draft_ready_for_review → QAReviewAgent, draft_approved → SchedulingEngine+Publisher (ThreadPoolExecutor max_workers=3). Unhandled exception: quarantine_set.add(item_id), write checkpoint(status='error'), notify."

          - title: "Implement EventBus with thread-safe pub/sub and checkpoints_store"
            task_type: implementation
            source_role: architect
            description: "EventBus: pub/sub with threading.Lock for concurrent dispatch. checkpoints_store: SQLite pipeline_checkpoints (all PipelineCheckpoint fields). Methods: insert(), get_by_brief_id(), get_errors()."

          - title: "Define PipelineCheckpoint model and pipeline CLI log/run/status commands"
            task_type: implementation
            source_role: po
            description: "PipelineCheckpoint: checkpoint_id UUID, brief_id, draft_id optional, stage enum (ideation/drafting/qa/approval/scheduling/publishing), status enum (started/completed/error/quarantined), input_status, output_status, agent_used, started_at, completed_at optional, error_type optional, error_detail optional. CLI: flex pipeline log <brief_id>, flex pipeline run, flex pipeline status."

          - title: "Design pipeline status board and per-brief audit timeline"
            task_type: design
            source_role: designer
            description: "Pipeline status board: horizontal stage flow (5 stages), each with count badge (in_progress/completed/blocked) and status color (green/amber/red/gray). Below: active items list (platform icon, topic, current stage, time in stage). Per-brief audit timeline: vertical nodes per transition, error nodes red+expanded, final node Published or Quarantine icon."

      - title: "As a content creator, I want a full audit trail of what happened to each piece of content so I can diagnose failures"
        acceptance_criteria:
          - "Given brief passed through all 4 stages, When 'flex pipeline log <brief_id>' run, Then all stage transitions shown with timestamps, agent used, input/output status, duration"
          - "Given brief has failed publish in history, When log shown, Then failure entry shows error type, retry count, final resolution"
        tasks:
          - title: "Write tests: quarantine, parallel 3-limit, EventBus thread safety, optimistic locking prevents duplicates"
            task_type: test
            source_role: qa
            description: "Quarantine: unhandled exception → item in quarantine_set, checkpoint written, notifier called, not reprocessed. Parallel: 5 approved drafts → max 3 concurrent publisher calls (ThreadPoolExecutor max_workers=3). EventBus: 3 subscribers called, concurrent publish no race condition. Optimistic locking: 2 ticks try to claim same row → only one succeeds (other row already 'in_progress'). Full pipeline log shows all checkpoints in order."
