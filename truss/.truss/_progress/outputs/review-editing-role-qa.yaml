role: qa
stream_name: review-editing

feature_analyses:
  - feature_name: "QA Review Agent"
    analysis: >
      QAReviewAgent has two risky behaviours: (1) JVM availability for LanguageTool —
      tests must mock the backend so CI doesn't require a JVM, (2) parallel check
      execution — a failure in one check must not silently suppress others. The
      suggestion character offset mapping is fragile: offsets from LanguageTool are
      byte-indexed, but Python strings are Unicode — tests must include non-ASCII text.
      The brand_voice check must be tested with edge cases: avoid_word as a substring
      of a longer word ('sync' in 'synchronize'), case sensitivity, hyphenated words.
      Platform re-validation must be tested to confirm it catches regressions introduced
      by human edits (e.g., user shortens LinkedIn post below 1300 chars).
    tasks:
      - title: "Write unit tests for QAReviewAgent checks with mocked backends"
        task_type: test
        description: >
          Test file: tests/flex/agents/test_qa_review_agent.py
          Grammar:
          - test_grammar_errors_detected: mock LanguageTool returning 2 matches → QACheck.passed=False, 2 suggestions
          - test_grammar_passes_clean_text: mock returning 0 matches → QACheck.passed=True
          - test_grammar_unicode_offset: text with emoji/non-ASCII → suggestion offsets map to correct chars
          - test_grammar_backend_unavailable: LanguageTool raises → QACheck skipped with warning, others run
          Readability:
          - test_readability_fk_grade_above_threshold: FK 11 → readability.passed=False, fk_grade=11.0
          - test_readability_passes_fk_7: FK 7 → readability.passed=True
          - test_readability_suggestions_identify_long_sentences: FK 11 → at least 1 suggestion with specific sentence
          Brand Voice:
          - test_brand_voice_detects_avoid_word: 'synergy' in avoid_words → passed=False, suggestion identifies word
          - test_brand_voice_word_boundary: avoid_word='sync' in text 'synchronize' → NOT flagged (word boundary)
          - test_brand_voice_case_insensitive: avoid_word='Jargon', text has 'JARGON' → flagged
          - test_brand_voice_passes_clean_text: no avoid_words in text → passed=True
          Platform re-validation:
          - test_platform_revalidation_catches_regression: LinkedIn post edited to 800 chars → platform.passed=False
          - test_parallel_checks_run_independently: grammar raises → readability/brand_voice/platform still complete

      - title: "Write integration tests for qa_reports_store and suggestion accept/ignore"
        task_type: test
        description: >
          Test file: tests/flex/store/test_qa_reports_store.py
          Cases:
          - test_insert_and_get_by_draft_id: insert QAReport → get_by_draft_id returns identical report
          - test_get_most_recent_report: 2 reports for same draft_id → get_by_draft_id returns most recent
          - test_update_suggestion_status_accepted: call update_suggestion_status(report_id, suggestion_id, 'accepted') → suggestion.status='accepted', accepted_count incremented
          - test_update_suggestion_status_ignored: → ignored_count incremented
          - test_payload_round_trip: QAReport with nested suggestions → serialize, deserialize, identical

  - feature_name: "Human-in-the-Loop Approval"
    analysis: >
      The approval state machine has a fixed set of valid transitions — tests must
      verify invalid transitions are rejected (can't approve an already-rejected draft,
      can't request-changes on an already-approved draft). The publishing-orchestration
      contract (get_approved() strictly filters status='approved') must be verified
      end-to-end: approved draft must appear in get_approved(), all other statuses
      must not. The audit trail completeness test: every approval decision must
      produce an ApprovalRecord with all required fields.
    tasks:
      - title: "Write unit tests for ApprovalGate state machine and transition guards"
        task_type: test
        description: >
          Test file: tests/flex/agents/test_approval_gate.py
          Cases:
          - test_approve_transitions_to_approved: draft qa_passed → approve() → status='approved'
          - test_approve_from_qa_flagged_allowed: draft qa_flagged → approve() → status='approved' (human override)
          - test_request_changes_requires_notes: request_changes(draft_id, notes=None) → raises ValueError
          - test_request_changes_empty_notes_raises: notes='' → raises ValueError
          - test_reject_updates_status: reject(draft_id, reason) → status='rejected'
          - test_invalid_transition_already_approved: approve() on approved draft → raises InvalidTransitionError
          - test_approval_creates_audit_record: approve() → approval_records_store.insert called with correct fields
          - test_get_approved_strict_filter: insert drafts with all statuses → get_approved() returns only status='approved'

      - title: "Write integration tests for approval audit trail completeness"
        task_type: test
        description: >
          Test file: tests/flex/store/test_approval_records_store.py
          Cases:
          - test_insert_and_get_by_draft_id: insert ApprovalRecord → get_by_draft_id returns with all fields
          - test_audit_record_has_reviewer_context: approval triggers → ApprovalRecord.reviewer_context contains platform, word_count, qa_status
          - test_get_all_returns_all_records: 5 approvals → get_all() returns 5
          - test_reject_record_has_reason: reject with reason → ApprovalRecord.notes=reason

  - feature_name: "Feedback Loop and Style Learning"
    analysis: >
      FeedbackLoopEngine has two precision tests: (1) the trivial edit threshold must
      be tested at the boundary (exactly 10 chars, exactly 9 chars), (2) the diff
      computation must correctly classify edit types (word substitution vs restructure
      vs pure addition). The corpus file write must be tested to confirm VoiceConsistencyEngine
      picks it up on next refresh (cache invalidation by new file). The 2x weighting
      of user_edit entries (architect's recommendation) must be verified in
      VoiceConsistencyEngine.
    tasks:
      - title: "Write unit tests for FeedbackLoopEngine diff computation and trivial edit filter"
        task_type: test
        description: >
          Test file: tests/flex/agents/test_feedback_loop_engine.py
          Cases:
          - test_trivial_edit_skipped: 9 chars changed → returns None, no file written
          - test_trivial_edit_threshold_boundary: exactly 10 chars changed → corpus entry created
          - test_word_sub_detected: 'utilize' → 'use' → edit_type='word_sub'
          - test_restructure_detected: sentence reordered → edit_type='restructure'
          - test_corpus_file_written_to_corpus_path: process() → file exists in voice_corpus_path
          - test_corpus_file_is_valid_yaml: written file parses as VoiceCorpusEntry with all fields
          - test_voice_engine_cache_invalidated_after_edit: new file → VoiceConsistencyEngine.refresh()
            called next time → LLM re-called (cache miss)

edge_cases:
  - "LanguageTool JVM not available AND no API key configured: QAReviewAgent must run without grammar check, log clear error, not crash"
  - "brand_voice_rules.yaml missing or malformed: QAReviewAgent skips brand_voice check with warning (not crash)"
  - "User approves draft that was edited post-QA (QA suggestions no longer match body): QAReport becomes stale — show warning 'Draft was edited after QA. Re-run QA?' in approval view"
  - "FeedbackLoopEngine called with identical original and approved body (user approved without editing): no corpus entry, no LLM call"
  - "Draft approved while QA is still running (race condition): approval must check for in-progress QA and block or warn"

integration_notes: >
  Cross-stream contracts verified by QA:
  1. content-drafting → review-editing: drafts_store.get_pending_review() must return
     drafts with status IN ('ready_for_review', 'selected', 'qa_passed', 'qa_flagged').
     QA to write integration test that inserts a draft via DraftingAgent and verifies
     it appears in get_pending_review() without direct DB manipulation.
  2. review-editing → publishing-orchestration: drafts_store.get_approved() must return
     ONLY status='approved' drafts. QA to write contract test that approves a draft
     and verifies it appears in get_approved(), then rejects another and verifies it
     does NOT appear. This test is the gate for publishing-orchestration correctness.
  Platform validators shared between content-drafting and review-editing (extracted to
  modules/flex/agents/drafting/validators.py): QA must verify that fixing a test in
  the shared validator fixes both the drafting agent test and the QA re-validation test.

completed: true
