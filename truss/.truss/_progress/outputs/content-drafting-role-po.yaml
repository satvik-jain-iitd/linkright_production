role: po
stream_name: content-drafting

feature_analyses:
  - feature_name: "Platform-Specialist Drafting Agents"
    analysis: >
      Core value: zero reformatting tax on the user. The user wrote a brief — they
      should never need to reformat for LinkedIn vs X vs YouTube. The auto-trigger
      story (DraftingOrchestrator polling) is p1 not p2 because a manual trigger
      creates friction that defeats the automation promise. The failure isolation
      requirement (error doesn't consume brief) is business-critical — losing an
      approved brief is unrecoverable without re-running the entire ideation flow.
      Platform-specific formatting constraints are acceptance criteria, not nice-to-haves.
      Assumption: ContentBrief.brief_schema_version='1.0' is the interface contract —
      any schema change in content-ideation must be coordinated.
    tasks:
      - title: "Define Draft Pydantic model with platform-specific fields"
        task_type: implementation
        description: >
          Create modules/flex/models/draft.py with Draft model: draft_id (UUID),
          brief_id (str), platform (Platform enum), version (int, default=1),
          status (enum: ready_for_review/selected/archived/published), body (str),
          platform_fields (dict — platform-specific extras: thread/hashtags/title/description/script_outline),
          created_at, updated_at. brief_schema_version field to track which brief version
          this draft was generated from.

      - title: "Write platform-specific system prompts for all 5 agents"
        task_type: implementation
        description: >
          Create modules/flex/prompts/drafting_prompts.py with DRAFTING_PROMPTS dict.
          linkedin: staircase format (2-sentence paragraphs, blank-line separated),
          1300-1600 chars, professional hook from brief, CTA at end.
          x: thread format, hook as tweet[0], each tweet <= 280 chars, CTA in final tweet.
          youtube: title < 60 chars + keyword, description 200-300 words SEO,
          script_outline as sections with timestamps.
          instagram: caption 125-200 chars, 15-20 hashtags, at least 1 emoji.
          facebook: 400-600 chars, ends with question (no hashtags).

      - title: "Define DraftingOrchestrator polling config and error handling spec"
        task_type: implementation
        description: >
          Add draft_poll_interval_minutes (int, default=15) to AgentConfig. Document
          DraftingOrchestrator contract: polls briefs_store.get_approved_undrafted(),
          instantiates correct platform agent, runs draft(), writes to drafts_store.
          On Claude API error: log error, brief stays approved, continue to next brief.
          On drafts_store write error: retry once, then skip brief and alert.

      - title: "Implement 'flex draft list' and 'flex draft show' CLI commands"
        task_type: implementation
        description: >
          Add list subcommand to draft_commands.py: reads drafts_store, shows table
          (brief_id, platform, version, status, word_count, created_at).
          Add show subcommand: prints full draft body for given draft_id.
          Both commands support --status filter.

  - feature_name: "Tone and Voice Consistency Engine"
    analysis: >
      This is the differentiator feature — without voice consistency, users get
      generic AI-sounding content. The 'flex voice show' story is p1 for trust:
      users need to see and verify their detected voice profile before trusting
      the engine. If the profile is wrong, all drafts will be wrong. Graceful
      degradation (no corpus → draft without voice) is non-negotiable for
      onboarding — new users have no corpus yet. The corpus format must be simple
      (plain text or minimal YAML) so users can paste their old posts without
      format conversion overhead.
    tasks:
      - title: "Define VoiceProfile Pydantic model and voice_corpus_path config"
        task_type: implementation
        description: >
          Create modules/flex/models/voice_profile.py: VoiceProfile with
          avg_sentence_words (float), fk_grade (float), emoji_density (float 0-1),
          tone_signature (enum: analytical/storytelling/provocative/educational),
          dominant_vocabulary_level (enum: simple/intermediate/advanced),
          corpus_post_count (int), built_at (datetime).
          Add voice_corpus_path: str | None = None to AgentConfig.

      - title: "Implement 'flex voice show' CLI command"
        task_type: implementation
        description: >
          Add 'show' subcommand to voice_commands.py. Reads cached VoiceProfile,
          prints human-readable format: tone_signature label, FK grade with
          readability description, emoji density as percentage, vocab level label.
          Empty corpus: shows onboarding message with path config instructions.
          --platform flag: filters to platform-specific analysis if available.

  - feature_name: "Draft Versioning and A/B Variants"
    analysis: >
      This is p2 — the pipeline works without it, but it's a significant UX
      unlock for quality-conscious creators who want to compare before deciding.
      The compare CLI story matters more than the generation story from a UX
      perspective — generation is invisible, but comparison is the decision surface.
      The --select workflow must be clear and irreversible (archived status) to
      prevent confusion in the review-editing stream about which draft to review.
      Risk: brief with only 1 angle breaks the variant promise. Must handle
      gracefully — alternate tone is an acceptable fallback.
    tasks:
      - title: "Define variant generation user-facing flow and --select workflow"
        task_type: implementation
        description: >
          Add 'variants' and 'compare' subcommands to draft_commands.py.
          variants: accepts brief_id, triggers DraftVersioningEngine.generate_variants(),
          prints both draft IDs and statuses.
          compare: renders both drafts side by side with metrics header (version,
          hook, tone, word_count, fk_grade). --select <1|2> promotes one to
          'selected', archives the other. Shows confirmation before archiving.

completed: true
