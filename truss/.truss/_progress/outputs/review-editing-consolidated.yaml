features:
  - name: "QA Review Agent"
    priority: p1
    integration_notes: "Roles: po (QAReport model, brand_voice_rules schema, flex review CLI commands), architect (QABackend ABC + LanguageTool/textstat backends, parallel 4-check pipeline, qa_reports_store, validator extraction to shared module), designer (sticky QA summary bar with 4 check pills, inline underlined suggestion spans with hover tooltip Accept/Ignore, 2-column review layout), qa (mocked backend tests for all 4 checks, word-boundary brand voice, parallel failure isolation, suggestion offset Unicode, store round-trip). Input: drafts_store.get_pending_review(). Output: draft.status updated to qa_passed/qa_flagged, QAReport stored."
    stories:
      - title: "As a content creator, I want automated quality checks on my draft so I catch grammar, readability, and brand voice issues before I review"
        acceptance_criteria:
          - "Given draft with 2 grammar errors, When QAReviewAgent.review() called, Then QAReport.grammar.passed=False, 2 suggestions with location (char range), issue, and recommendation"
          - "Given draft with FK Grade 11 (above target 9), When QAReviewAgent.review() called, Then QAReport.readability.passed=False, fk_grade=11.0, suggestions identify long sentences"
          - "Given brand_voice_rules.yaml has avoid=['synergy'], When draft contains 'synergy', Then QAReport.brand_voice.passed=False with suggestion identifying offending word"
          - "Given draft passes all 4 checks, When QAReviewAgent.review() called, Then QAReport.overall_passed=True, draft.status='qa_passed'"
          - "Given draft fails any check, When QAReviewAgent.review() called, Then QAReport.overall_passed=False, draft.status='qa_flagged'"
        tasks:
          - title: "Create QABackend ABC with LanguageTool backend and textstat readability backend"
            task_type: implementation
            source_role: architect
            description: "modules/flex/agents/qa/qa_backend.py: QABackend ABC with check_grammar(text) -> list[Suggestion] and check_readability(text) -> ReadabilityResult. LanguageToolBackend: uses language_tool_python (local JVM) with fallback to LanguageTool REST API. TextstatBackend: textstat library for FK grade, avg_sentence_words. Config: qa_backend enum in AgentConfig."

          - title: "Implement QAReviewAgent with 4 parallel checks and brand voice rule loading"
            task_type: implementation
            source_role: architect
            description: "modules/flex/agents/qa_review_agent.py: run 4 checks in ThreadPoolExecutor(max_workers=4). Grammar via QABackend, readability via TextstatBackend, brand_voice via string search on avoid_words (word-boundary aware, case-insensitive), platform_constraints via shared validators. Aggregate into QAReport. Update draft.status to qa_passed/qa_flagged."

          - title: "Extract platform validators from DraftingAgent subclasses to shared validators module"
            task_type: implementation
            source_role: architect
            description: "modules/flex/agents/drafting/validators.py: extract structural validators from each platform DraftingAgent (LinkedIn body length + staircase, X thread length + tweet chars, YouTube title + description, Instagram caption + hashtag count, Facebook body length + no hashtags). Each returns list[Suggestion]. Both DraftingAgent subclasses and QAReviewAgent import from here."

          - title: "Implement qa_reports_store SQLite with suggestion status update"
            task_type: implementation
            source_role: architect
            description: "modules/flex/store/qa_reports_store.py: SQLite qa_reports(id, draft_id, overall_passed, payload TEXT, reviewed_at). payload=json.dumps(QAReport.model_dump()). Methods: insert(), get_by_draft_id() (most recent), update_suggestion_status(report_id, suggestion_id, status)."

          - title: "Define QAReport Pydantic model, brand_voice_rules schema, and implement flex review CLI"
            task_type: implementation
            source_role: po
            description: "QAReport with grammar/readability/brand_voice/platform_constraints as QACheck objects (passed, suggestions list, accepted_count, ignored_count). Suggestion: suggestion_id, location (CharRange), issue, recommendation, category, status. BrandVoiceRules from brand_voice_rules.yaml: avoid_words, prefer_words, max_fk_grade (default 9.0). flex review queue/show/approve/reject/request-changes CLI commands."

          - title: "Design sticky QA summary bar, inline suggestion spans with tooltip, and 2-column review layout"
            task_type: design
            source_role: designer
            description: "QA summary bar: 4 check pills (Grammar/Readability/Brand Voice/Format, green ✓ or red ✗ with count badge), sticky top. Inline spans: grammar=red wavy, readability=amber dotted, brand_voice=purple dashed, platform=blue solid. Hover tooltip (140px): issue + recommendation + [Accept ✓] [Ignore ×]. 2-column layout: draft editor 70% + QA sidebar 30%. Mobile: bottom sheet."

      - title: "As a content creator, I want to see QA suggestions inline in the draft view so I can decide whether to accept or ignore each one"
        acceptance_criteria:
          - "Given QAReport with 3 grammar suggestions, When review view opens, Then 3 red underlined spans at correct char offsets in draft body"
          - "Given user clicks 'Accept' on grammar suggestion, When accepted, Then draft body updated with recommendation, span removed, QAReport.grammar.accepted_count incremented"
          - "Given user clicks 'Ignore', When ignored, Then span removed from view, draft body unchanged, suggestion stored as ignored in QAReport"
        tasks:
          - title: "Write unit tests for all 4 QA checks and qa_reports_store integration"
            task_type: test
            source_role: qa
            description: "Grammar tests (mocked LanguageTool): errors detected, clean text passes, Unicode offset mapping, backend unavailable continues others. Readability: FK 11 fails, FK 7 passes, long sentences identified. Brand voice: avoid word detected, word-boundary ('sync' not flagged in 'synchronize'), case-insensitive. Platform re-validation: regression caught post-edit. Store: insert+get round-trip, most-recent report, suggestion accept/ignore status update."

  - name: "Human-in-the-Loop Approval"
    priority: p1
    integration_notes: "Roles: po (ApprovalRecord model, flex review approve/reject/request-changes CLI, approval queue view), architect (ApprovalGate state machine with transition guards, approval_records_store audit trail, strict status filter on get_approved()), designer (approval view with platform preview + QA summary + three-action footer + confirmation checkbox, notes sidebar, rejection modal, approval queue table with Quick Approve), qa (state machine transition tests, invalid transition rejection, get_approved strict filter, audit trail completeness). Gate: NOTHING publishes without status='approved'."
    stories:
      - title: "As a content creator, I want to see my draft exactly as it will appear on the platform before I approve it so I can catch visual formatting issues"
        acceptance_criteria:
          - "Given draft with status='qa_passed', When approval view opened, Then draft rendered in platform-native preview with QA summary bar showing pass counts"
          - "Given user clicks 'Approve' (with confirmation checkbox checked), When confirmed, Then draft.status='approved', approved_at stored, draft available to publishing-orchestration"
          - "Given user clicks 'Request Changes' with notes 'Make hook more punchy', When submitted, Then draft.status='changes_requested', notes stored in ApprovalRecord"
          - "Given user clicks 'Reject' with reason, When confirmed, Then draft.status='rejected', reason stored, draft excluded from publishing queue permanently"
          - "Given draft with status='qa_flagged', When approval view opened, Then prominent warning banner: 'This draft has QA issues. Review before approving.' with unresolved suggestion count"
        tasks:
          - title: "Implement ApprovalGate state machine with transition guards and InvalidTransitionError"
            task_type: implementation
            source_role: architect
            description: "modules/flex/agents/approval_gate.py: approve()/request_changes()/reject() validate current draft status before transition. Invalid transitions raise InvalidTransitionError. request_changes() requires non-empty notes. All transitions update drafts_store + insert ApprovalRecord. drafts_store.get_approved() strictly filters status='approved'."

          - title: "Implement approval_records_store with audit trail"
            task_type: implementation
            source_role: architect
            description: "modules/flex/store/approval_records_store.py: SQLite approval_records(id, draft_id, decision, decided_at, notes, reviewer_context). reviewer_context=JSON(platform, word_count, qa_status at decision time). Methods: insert(), get_by_draft_id(), get_all()."

          - title: "Define ApprovalRecord model and implement flex review approve/reject/request-changes CLI"
            task_type: implementation
            source_role: po
            description: "modules/flex/models/approval_record.py: ApprovalRecord(record_id UUID, draft_id, decision enum: approved/changes_requested/rejected, decided_at, notes, reviewer_context). CLI commands: approve (confirmation checkbox required), reject (--reason required, opens reason prompt), request-changes (--notes required). All require confirmation except with --yes flag."

          - title: "Design approval view with platform preview, three-action footer, and approval queue"
            task_type: design
            source_role: designer
            description: "Approval view: platform-native preview (reused from content-drafting, view-only mode) + QA summary bar. Sticky footer: [Approve ✓] (filled green, requires checkbox 'I've previewed on [Platform]') | [Request Changes ↩] (outlined, opens 360px notes sidebar) | [Reject ✗] (text-only red, opens modal with reason dropdown). Queue table: platform icon, topic, QA badge, age, word count. Quick Approve button on hover for qa_passed rows."

          - title: "Write unit + integration tests for ApprovalGate and audit trail"
            task_type: test
            source_role: qa
            description: "State machine: approve/request-changes/reject transitions, invalid transition raises error, request-changes requires notes, get_approved strict filter (only 'approved' returned), approve from qa_flagged allowed (human override). Audit: every approval creates record, record has reviewer_context, get_all returns all records."

      - title: "As a content creator, I want an approval queue showing all drafts awaiting my review so I can process them efficiently"
        acceptance_criteria:
          - "Given 5 drafts pending review, When approval queue opened, Then all 5 listed with platform icon, topic, QA status, age, word count"
          - "Given draft with QAReport.overall_passed=True, When shown in queue, Then 'Quick Approve' button visible"
          - "Given user clicks 'Quick Approve', When confirmed, Then draft.status='approved' without opening full approval view"
        tasks:
          - title: "Implement 'flex review queue' with Quick Approve action"
            task_type: implementation
            source_role: po
            description: "review_commands.py: queue subcommand lists pending drafts (status IN qa_passed/qa_flagged/ready_for_review) with table columns. Quick Approve: flex review approve <draft_id> --quick — skips full view, requires --yes or interactive confirmation. Pagination: --page flag, 10 per page default."

  - name: "Feedback Loop and Style Learning"
    priority: p2
    integration_notes: "Roles: po (VoiceCorpusEntry model, flex voice edits CLI), architect (FeedbackLoopEngine with difflib diff, trivial edit threshold, LLM style extraction, corpus YAML write; VoiceConsistencyEngine sampling update: user_edit prioritized over past_post in 20-post sample), designer (post-approval 'Style learned' toast, voice edits history table with edit type chips + style signal), qa (trivial threshold boundary, edit type classification, corpus file written and valid, cache invalidation verified). user_edit entries written to voice_corpus_path, picked up automatically by VoiceConsistencyEngine."
    stories:
      - title: "As a content creator, I want my editing corrections to automatically improve future drafts so the AI learns my style without me having to teach it"
        acceptance_criteria:
          - "Given user edits draft body ('utilize' → 'use', sentence restructure), When user approves, Then FeedbackLoopEngine creates corpus entry with type='user_edit', original_text, edited_text, edit_type, and style_signal"
          - "Given diff has < 10 chars changed (minor punctuation), When FeedbackLoopEngine processes, Then no corpus entry created (trivial edit threshold)"
          - "Given 3 user_edit corpus entries exist, When VoiceConsistencyEngine.refresh() called, Then edit entries included first in 20-post sample (prioritized over past_post entries)"
        tasks:
          - title: "Implement FeedbackLoopEngine with difflib diff, trivial filter, LLM style extraction, and corpus write"
            task_type: implementation
            source_role: architect
            description: "modules/flex/agents/feedback_loop_engine.py: process(original_body, approved_body, draft_id, platform): difflib.SequenceMatcher for diff, count chars changed, skip if < 10. Single Claude API call for edit_type classification + style_signal extraction (JSON output). Write VoiceCorpusEntry as YAML to voice_corpus_path/edit_{draft_id}_{ts}.yaml. Update VoiceConsistencyEngine sampling: user_edit entries included first when building 20-post sample."

          - title: "Define VoiceCorpusEntry model and 'flex voice edits' CLI"
            task_type: implementation
            source_role: po
            description: "modules/flex/models/voice_corpus_entry.py: VoiceCorpusEntry(entry_id UUID, type enum: past_post/user_edit, created_at, platform optional, text str, edit_metadata optional: original_text, edited_text, edit_type enum, style_signal str). voice_commands.py: edits subcommand reads voice_corpus_path for user_edit entries, prints table (date, edit_type chip, original snippet, edited snippet, style_signal), --last N flag."

          - title: "Write tests for FeedbackLoopEngine and VoiceConsistencyEngine sampling update"
            task_type: test
            source_role: qa
            description: "FeedbackLoopEngine: trivial edit (9 chars) skipped, threshold boundary (10 chars) creates entry, word_sub detected, restructure detected, YAML file written to corpus path, valid VoiceCorpusEntry. VoiceConsistencyEngine sampling: 15 past_posts + 8 user_edits → LLM receives all 8 user_edits + 12 past_posts (total 20). Cache invalidated after new edit file written."

      - title: "As a content creator, I want to see what style patterns the AI learned from my edits so I can verify the feedback loop is working"
        acceptance_criteria:
          - "Given 5 user_edit entries in corpus, When 'flex voice edits' run, Then CLI shows date/edit_type/original snippet/edited snippet/style_signal table"
          - "Given 0 user_edit entries, When 'flex voice edits' run, Then message: 'No edits recorded yet. Edit and approve a draft to start learning your style.'"
        tasks:
          - title: "Design style learning toast and voice edits history view"
            task_type: design
            source_role: designer
            description: "Post-approval toast (4s, bottom-right, 280px): '✨ Style learned from your edits.' + [View Edits] link. Appears only if diff > 10 chars. Voice edits history table: Date | Edit Type chip (Word Sub=blue/Restructure=purple/Addition=green/Deletion=red) | Original snippet (20 chars) | Edited snippet (20 chars) | Style Signal (italic chip). Empty state: illustrated card + how-it-works description."
