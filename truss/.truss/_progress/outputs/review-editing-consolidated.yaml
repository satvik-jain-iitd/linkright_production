conflicts:
  - feature: "QA Review Agent"
    conflict_type: "shared_validator_ownership"
    positions:
      architect: "Platform structural validators should be extracted from DraftingAgent subclasses to modules/flex/agents/drafting/validators.py for reuse in QAReviewAgent"
      qa: "Shared validators must be tested once in a shared test, not duplicated across drafting and QA test suites"
    decision: "Extract validators to modules/flex/agents/drafting/validators.py. Both DraftingAgent subclasses and QAReviewAgent import from there. QA writes a single test file tests/flex/agents/drafting/test_validators.py that covers both use cases."
    rationale: "DRY principle. Prevents validator drift where drafting accepts a draft that QA then rejects. Single source of truth."
    impact: "content-drafting stream must be updated to move validators before review-editing implements QAReviewAgent platform check."

  - feature: "Feedback Loop and Style Learning"
    conflict_type: "voice_engine_weighting"
    positions:
      architect: "user_edit corpus entries should be weighted 2x in VoiceConsistencyEngine analysis (more signal-rich than generic past posts)"
      po: "No weighting mentioned in VoiceProfile spec — VoiceCorpusEntry type field should be sufficient for the engine to handle weighting internally"
    decision: "VoiceConsistencyEngine sampling logic: when sampling max 20 posts, always include all user_edit entries first (they are always <= 20 in practice), then fill remaining slots with past_post entries. No explicit 2x weight in LLM prompt — recency + inclusion priority achieves the same effect."
    rationale: "Simpler than fractional weighting. user_edit entries are authoritative (actual user corrections) vs past_post (historical examples that may predate the user's current style)."
    impact: "VoiceConsistencyEngine.build_profile() sampling logic must partition by type, prioritize user_edit, then fill with past_post. Test: 15 past_posts + 8 user_edits → LLM receives all 8 user_edits + 12 past_posts (20 total)."

