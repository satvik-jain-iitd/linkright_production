stream_name: analytics

features:
  - name: "Performance Tracking and Data Ingestion"
    priority: p1
    description: >
      AnalyticsPoller reads publish_records_store for published posts, polls each
      platform's API for engagement metrics (impressions, likes, comments, shares,
      clicks, saves), and stores results in metrics_store. Polling is scheduled
      (default: 1h after publish, then 24h, then 7 days — three-point tracking).
      Platform API adapters: LinkedIn Analytics API, X API v2 metrics, YouTube
      Analytics API, Instagram Graph API, Facebook Page Insights API.
    scope_items_covered: [0]
    stories:
      - title: "As a content creator, I want post engagement metrics automatically collected so I can see how my content performs without manually checking each platform"
        description: >
          AnalyticsPoller.poll(publish_record) fetches metrics from the correct platform
          API adapter, stores a MetricsSnapshot in metrics_store, and triggers re-poll
          at scheduled intervals (1h, 24h, 7d post-publish).
        acceptance_criteria:
          - "Given a LinkedIn post published with platform_post_id, When AnalyticsPoller.poll() is called 1h after publish, Then a MetricsSnapshot is stored with impressions, likes, comments, shares, clicks for that post_id"
          - "Given a post with 3 scheduled poll times (1h, 24h, 7d), When all 3 complete, Then metrics_store has 3 MetricsSnapshot records for the same post_id, each with a different polled_at timestamp"
          - "Given a platform API returns a 429 rate-limit, When AnalyticsPoller.poll() is called, Then it waits the retry-after header duration and retries once, logging the delay"
          - "Given a platform API returns 404 (post deleted), When AnalyticsPoller.poll() is called, Then the publish_record is marked as post_deleted and no further polls are scheduled"

      - title: "As a content creator, I want to see raw engagement numbers for each post so I can track performance at a glance"
        description: >
          'flex analytics post <post_id>' CLI shows the latest MetricsSnapshot for a
          given publish_record, with a trend indicator if earlier snapshots exist.
        acceptance_criteria:
          - "Given 3 MetricsSnapshots exist for a post, When 'flex analytics post <post_id>' is run, Then CLI shows latest metrics (impressions, likes, comments, shares, clicks) with delta vs previous snapshot"
          - "Given only 1 snapshot exists, When 'flex analytics post' is run, Then metrics shown without delta (delta column shows '--')"
    files_affected:
      - "modules/flex/agents/analytics/analytics_poller.py"
      - "modules/flex/agents/analytics/platform_analytics_adapters.py"
      - "modules/flex/store/metrics_store.py"
      - "modules/flex/models/metrics_snapshot.py"
      - "modules/flex/cli/analytics_commands.py"
    dependencies: []

  - name: "Analytics Dashboard and Pattern Detection"
    priority: p1
    description: >
      PatternDetectionEngine analyses metrics_store to identify top-performing
      topics, formats (LinkedIn long-form vs X thread), and posting times. Outputs
      a PerformanceSummary with rankings and insights (e.g., "Your LinkedIn posts
      on Tue at 08:30 get 2.3x more impressions than average"). CLI dashboard and
      per-platform breakdowns.
    scope_items_covered: [1, 2]
    stories:
      - title: "As a content creator, I want a dashboard showing my content performance across all platforms so I understand what's working"
        description: >
          'flex analytics dashboard' shows a summary of all published posts grouped
          by platform, with aggregate engagement rates and top/bottom performers.
        acceptance_criteria:
          - "Given 10 published posts across 3 platforms, When 'flex analytics dashboard' is run, Then CLI shows per-platform summary: total posts, avg impressions, avg engagement_rate (likes+comments+shares / impressions), top-performing post title"
          - "Given 0 published posts, When 'flex analytics dashboard' is run, Then message: 'No published posts yet. Approve and publish content to see analytics.'"
          - "Given 'flex analytics dashboard --platform linkedin' is run, Then only LinkedIn posts are shown with LinkedIn-specific metrics (no YouTube/Instagram columns)"

      - title: "As a content creator, I want to know which content patterns perform best so I can create more of what works"
        description: >
          PatternDetectionEngine computes: best performing topic clusters (by tag/keyword),
          best performing format (by platform), best performing time windows (by day + hour).
          Minimum 5 posts per platform to generate reliable patterns.
        acceptance_criteria:
          - "Given 8 LinkedIn posts with engagement data, When PatternDetectionEngine.detect() is called, Then it returns: top_topic (most common keyword in high-engagement posts), best_day (weekday with highest avg engagement), best_time_window (hour range), top_format (thread vs long-form vs short)"
          - "Given fewer than 5 posts for a platform, When PatternDetectionEngine.detect() is called for that platform, Then it returns a PatternInsufficient result with message: 'Need 5+ posts for reliable patterns. [n] so far.'"
          - "Given PatternDetectionEngine runs on 10 posts, When 'flex analytics patterns' is run, Then output shows at most 3 insight bullets per platform in plain English (not raw numbers)"
    files_affected:
      - "modules/flex/agents/analytics/pattern_detection_engine.py"
      - "modules/flex/models/performance_summary.py"
      - "modules/flex/cli/analytics_commands.py"
    dependencies:
      - "Performance Tracking and Data Ingestion"

  - name: "Content Recommendation Engine"
    priority: p2
    description: >
      RecommendationEngine uses historical performance patterns to generate actionable
      recommendations for future content: which topics to pursue, which platforms to
      prioritize, and what formats to use. Recommendations are stored and surfaced
      in the ideation flow (shown alongside scored opportunities). Updated after each
      new analytics poll cycle.
    scope_items_covered: [3]
    stories:
      - title: "As a content creator, I want AI-generated recommendations based on my past performance so I focus on content that's proven to work for my audience"
        description: >
          RecommendationEngine.generate(platform) calls PatternDetectionEngine and
          produces a list of Recommendation objects: topic_suggestion, format_suggestion,
          timing_suggestion, each with a rationale and confidence_score (0-1).
        acceptance_criteria:
          - "Given sufficient analytics data (5+ posts), When RecommendationEngine.generate('linkedin') is called, Then returns 3-5 Recommendation objects, each with topic_suggestion, format_suggestion, timing_suggestion, rationale (1 sentence), and confidence_score"
          - "Given a recommendation has confidence_score < 0.4, When recommendations are shown, Then that recommendation is marked 'Low confidence — need more data'"
          - "Given recommendations exist, When 'flex ideation list' is run (content-ideation stream), Then top 2 recommendations are shown as a 'Based on your performance' card above the scored opportunities"

      - title: "As a content creator, I want to see why a recommendation was made so I trust the engine's suggestions"
        description: >
          'flex analytics recommend <platform>' shows recommendations with full
          rationale including which posts drove the insight.
        acceptance_criteria:
          - "Given a topic recommendation exists, When 'flex analytics recommend linkedin' is run, Then recommendation shows: suggested topic, rationale ('Your posts about AI Tools had 3.2x avg engagement vs your other topics'), and the 2-3 specific post titles that drove the insight"
          - "Given 0 performance data, When 'flex analytics recommend' is run, Then message: 'No recommendations yet. Need 5+ published posts per platform.'"
    files_affected:
      - "modules/flex/agents/analytics/recommendation_engine.py"
      - "modules/flex/models/recommendation.py"
      - "modules/flex/cli/analytics_commands.py"
    dependencies:
      - "Analytics Dashboard and Pattern Detection"

coverage_map:
  "Post-publish performance tracking": "Performance Tracking and Data Ingestion"
  "Per-platform analytics dashboard": "Analytics Dashboard and Pattern Detection"
  "Content performance patterns": "Analytics Dashboard and Pattern Detection"
  "Automated recommendations for future content": "Content Recommendation Engine"
