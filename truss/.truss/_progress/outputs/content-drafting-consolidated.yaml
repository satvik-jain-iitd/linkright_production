conflicts:
  - feature: "Platform-Specialist Drafting Agents"
    conflict_type: "cross_stream_schema_version"
    positions:
      architect: "DraftingAgent must check ContentBrief.brief_schema_version at init and raise SchemaVersionError on mismatch"
      qa: "SchemaVersionError must be caught by DraftingOrchestrator and logged with brief_id — not crash the orchestrator"
    decision: "DraftingAgent raises SchemaVersionError on version mismatch. DraftingOrchestrator catches it, logs with brief_id, continues to next brief. SchemaVersionError is a named exception in modules/flex/models/errors.py."
    rationale: "Explicit version check prevents silent data corruption when content-ideation evolves ContentBrief schema. Orchestrator-level catch ensures queue doesn't stall on a single schema mismatch."
    impact: "modules/flex/models/errors.py must define SchemaVersionError. DraftingOrchestrator exception handler must distinguish SchemaVersionError from API errors (different logging + alerting)."

