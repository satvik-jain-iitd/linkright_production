conflicts:
  - feature: "Content Recommendation Engine"
    conflict_type: "cross_stream_serialization_contract"
    positions:
      architect: "RecommendationEngine.get_for_ideation() returns list[Recommendation] Pydantic objects — clean typed interface for internal consumers"
      qa: "ideation CLI must display recommendations without importing analytics modules — Pydantic objects create a circular import; only JSON-serializable public fields (topic_suggestion, format_suggestion, timing_suggestion, rationale) are needed"
    decision: "get_for_ideation() returns list[dict] with only public fields (topic_suggestion, format_suggestion, timing_suggestion, rationale, confidence_score, platform). recommendations_store.get_top_n() reads JSON directly from SQLite — no Pydantic deserialization in ideation path."
    rationale: "Avoids circular import between analytics and ideation modules. All field validation is done by Pydantic at write time (before storage); reading back as dict is safe. JSON dict is already the wire format for cross-stream contracts in this pipeline."
    impact: "RecommendationEngine.get_for_ideation() signature changes from list[Recommendation] to list[dict]. recommendations_store.get_top_n() returns raw dict rows. Ideation CLI reads from recommendations_store directly without loading analytics module."

