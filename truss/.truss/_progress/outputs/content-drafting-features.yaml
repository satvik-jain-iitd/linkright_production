stream_name: content-drafting

features:
  - name: "Platform-Specialist Drafting Agents"
    priority: p1
    description: >
      Five specialist DraftingAgent subclasses, one per platform (LinkedIn, X, YouTube,
      Instagram, Facebook), each consuming an approved ContentBrief and generating a
      platform-native draft. LinkedIn agent produces long-form staircase-formatted posts
      (1300-1600 chars). X agent generates a thread of 3-7 tweets (each <= 280 chars).
      YouTube agent produces a title, description (SEO-optimized, 200-300 words), and
      script outline. Instagram agent generates a caption (125-200 chars) + hashtag set
      (15-20 tags). Facebook agent produces a mid-form post (400-600 chars). All agents
      use Claude API with platform-specific system prompts.
    scope_items_covered: [0, 1]
    stories:
      - title: "As a content creator, I want a specialist agent to draft platform-native content from my brief so the output matches each platform's format without manual reformatting"
        description: >
          Each DraftingAgent receives a ContentBrief and produces a Draft object with
          platform-specific fields populated. The agent selects the correct angle/hook
          combination from the brief based on the target_platform field.
        acceptance_criteria:
          - "Given an approved ContentBrief with target_platform='linkedin', When LinkedInDraftingAgent.draft() is called, Then a Draft is returned with body (1300-1600 chars), staircase_format=True (each paragraph <= 2 sentences, separated by blank lines), and at least 1 call_to_action"
          - "Given an approved ContentBrief with target_platform='x', When XDraftingAgent.draft() is called, Then a Draft is returned with thread (list of 3-7 strings each <= 280 chars), thread[0] is the hook from the brief, thread[-1] includes a CTA"
          - "Given an approved ContentBrief with target_platform='youtube', When YouTubeDraftingAgent.draft() is called, Then a Draft is returned with title (< 60 chars, includes target keyword), description (200-300 words, contains 3-5 SEO keywords), and script_outline (list of sections with timestamps)"
          - "Given an approved ContentBrief with target_platform='instagram', When InstagramDraftingAgent.draft() is called, Then a Draft is returned with caption (125-200 chars), hashtags (list of 15-20 strings, each starting with #), and at least 1 emoji in caption"
          - "Given an approved ContentBrief with target_platform='facebook', When FacebookDraftingAgent.draft() is called, Then a Draft is returned with body (400-600 chars), includes a question to drive comments, and does not contain hashtags (Facebook engagement anti-pattern)"

      - title: "As a content creator, I want drafts automatically triggered when a brief is approved so I don't need to manually kick off the drafting process"
        description: >
          DraftingOrchestrator polls briefs_store for approved briefs not yet drafted,
          instantiates the correct platform agent, runs draft(), and persists to drafts_store.
          Runs on a configurable schedule (default: every 15 minutes) or triggered manually.
        acceptance_criteria:
          - "Given a ContentBrief transitions to status='approved' in briefs_store, When DraftingOrchestrator next polls (within 15 minutes), Then a Draft is created in drafts_store with status='ready_for_review'"
          - "Given DraftingOrchestrator polls and finds 3 approved briefs, When it runs, Then all 3 are drafted in sequence (not skipped), each producing its own Draft record"
          - "Given Claude API returns an error during drafting, When DraftingOrchestrator handles the failure, Then the brief remains status='approved' (not consumed), the error is logged, and orchestrator continues to next brief"
    files_affected:
      - "modules/flex/agents/drafting/base_drafting_agent.py"
      - "modules/flex/agents/drafting/linkedin_drafting_agent.py"
      - "modules/flex/agents/drafting/x_drafting_agent.py"
      - "modules/flex/agents/drafting/youtube_drafting_agent.py"
      - "modules/flex/agents/drafting/instagram_drafting_agent.py"
      - "modules/flex/agents/drafting/facebook_drafting_agent.py"
      - "modules/flex/agents/drafting/drafting_orchestrator.py"
      - "modules/flex/store/drafts_store.py"
      - "modules/flex/models/draft.py"
      - "modules/flex/prompts/drafting_prompts.py"
    dependencies: []

  - name: "Tone and Voice Consistency Engine"
    priority: p1
    description: >
      VoiceConsistencyEngine learns the user's writing style from a corpus of past posts
      (provided as YAML/text files in a configured directory) and injects a personalized
      voice profile into each drafting agent's system prompt. Voice profile captures:
      sentence length preference, vocabulary richness (Flesch-Kincaid level), emoji
      frequency, punctuation habits, and tone signatures (detected via LLM classification).
      Updated automatically when new posts are added to the corpus.
    scope_items_covered: [2]
    stories:
      - title: "As a content creator, I want drafts to sound like me so my audience recognizes my voice across all platforms"
        description: >
          VoiceConsistencyEngine reads past posts from voice_corpus_path, extracts a
          VoiceProfile via LLM analysis (avg sentence length, fk_grade, emoji_density,
          tone_signature), and injects the profile as a voice_instruction block into
          each DraftingAgent system prompt.
        acceptance_criteria:
          - "Given voice_corpus_path contains at least 5 past posts, When VoiceConsistencyEngine.build_profile() is called, Then a VoiceProfile is returned with fields: avg_sentence_words (float), fk_grade (float), emoji_density (float 0-1), tone_signature (enum: analytical/storytelling/provocative/educational), dominant_vocabulary_level (simple/intermediate/advanced)"
          - "Given a VoiceProfile exists, When a DraftingAgent.draft() is called, Then the agent's system prompt includes a 'Voice Instructions' block derived from the profile (not the raw profile data)"
          - "Given new posts are added to voice_corpus_path, When VoiceConsistencyEngine.refresh() is called, Then the cached VoiceProfile is invalidated and rebuilt on next draft request"
          - "Given voice_corpus_path is not configured or empty, When a DraftingAgent.draft() is called, Then drafting proceeds without voice injection and logs a 'voice_corpus_missing' warning (not an error)"

      - title: "As a content creator, I want to see my detected voice profile so I can verify the engine understood my style correctly"
        description: >
          'flex voice show' CLI command prints the current VoiceProfile in a human-readable
          format, with per-platform tone detection if enough corpus posts are platform-tagged.
        acceptance_criteria:
          - "Given VoiceProfile exists, When 'flex voice show' is run, Then CLI prints: tone_signature, fk_grade, avg_sentence_words, emoji_density, and dominant_vocabulary_level with human-readable labels"
          - "Given 0 posts in corpus, When 'flex voice show' is run, Then message shown: 'No voice profile yet. Add past posts to voice_corpus_path to enable voice consistency'"
          - "Given corpus posts are tagged with platform metadata, When 'flex voice show --platform linkedin' is run, Then only LinkedIn-specific tone analysis is shown"
    files_affected:
      - "modules/flex/agents/voice_consistency_engine.py"
      - "modules/flex/models/voice_profile.py"
      - "modules/flex/cli/voice_commands.py"
      - "modules/flex/config/agent_config.py"
    dependencies:
      - "Platform-Specialist Drafting Agents"

  - name: "Draft Versioning and A/B Variants"
    priority: p2
    description: >
      DraftVersioningEngine stores every Draft generation as an immutable version.
      On request, generates A/B variants — two alternate takes on the same brief
      (different angle/hook selection, alternate tone) — enabling the user to compare
      and choose. Drafts_store tracks version history. 'flex draft variants <brief_id>'
      CLI triggers variant generation.
    scope_items_covered: [3]
    stories:
      - title: "As a content creator, I want A/B variants of my drafts so I can choose the best version before reviewing"
        description: >
          When a Draft is generated, DraftVersioningEngine creates a variant by selecting
          a different angle from the ContentBrief and applying an alternate tone. Both
          the original and variant are stored in drafts_store with version=1 and version=2.
        acceptance_criteria:
          - "Given an approved ContentBrief with 3+ angles, When 'flex draft variants <brief_id>' is run, Then 2 Draft records are created in drafts_store: version=1 (primary angle, brief's tone) and version=2 (alternate angle, alternate tone)"
          - "Given only 1 angle in ContentBrief, When 'flex draft variants <brief_id>' is run, Then variant uses the same angle but alternate tone, and a warning is logged: 'Only 1 angle available — variant uses alternate tone only'"
          - "Given variant generation is requested, When both drafts are created, Then both have status='ready_for_review' and are linked by the same brief_id"

      - title: "As a content creator, I want to see a side-by-side comparison of my draft variants so I can pick the best one quickly"
        description: >
          'flex draft compare <brief_id>' CLI prints both draft variants side by side
          with key metrics: word count, readability score, hook used, tone detected.
          User selects preferred variant with --select flag.
        acceptance_criteria:
          - "Given 2 draft variants exist for a brief_id, When 'flex draft compare <brief_id>' is run, Then CLI renders both drafts with headers showing: version, hook, tone, word_count, fk_grade"
          - "Given user runs 'flex draft compare <brief_id> --select 2', When confirmed, Then variant 2 is promoted to status='selected' and variant 1 is archived to status='archived'"
          - "Given only 1 draft exists for a brief_id, When 'flex draft compare' is run, Then message shown: 'Only 1 draft version exists. Run: flex draft variants <brief_id> to generate A/B variants'"
    files_affected:
      - "modules/flex/agents/draft_versioning_engine.py"
      - "modules/flex/store/drafts_store.py"
      - "modules/flex/cli/draft_commands.py"
      - "modules/flex/models/draft.py"
    dependencies:
      - "Platform-Specialist Drafting Agents"

coverage_map:
  "Multi-agent drafting: specialist agents per platform": "Platform-Specialist Drafting Agents"
  "Platform-specific formatting rules": "Platform-Specialist Drafting Agents"
  "Tone and voice consistency engine": "Tone and Voice Consistency Engine"
  "Draft versioning with A/B variant generation": "Draft Versioning and A/B Variants"
