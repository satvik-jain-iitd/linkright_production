role: qa
stream_name: analytics

feature_analyses:
  - feature_name: "Performance Tracking and Data Ingestion"
    analysis: >
      AnalyticsPoller's 3-point scheduling is the highest-risk behaviour — off-by-one
      errors in the scheduling table could cause missed or duplicate polls. The 429
      handling with Retry-After header must be tested with mock headers. The 404/post_deleted
      path must confirm: (1) publish_record updated, (2) remaining poll rows cancelled,
      (3) no further polls attempted. Platform adapter tests must mock each platform's
      actual API response format (they all differ significantly).
    tasks:
      - title: "Write unit tests for all 5 PlatformAnalyticsAdapters with mocked API responses"
        task_type: test
        description: >
          tests/flex/agents/analytics/test_platform_analytics_adapters.py:
          LinkedIn: mock /ugcPosts/{id}/statistics → metrics dict has impressions, likes, comments, shares, clicks
          X: mock /tweets/{id}?tweet.fields=public_metrics → metrics has impressions, likes, retweets, replies
          YouTube: mock /videos?part=statistics → metrics has views, likes, comments
          Instagram: mock /ig_media/{id}?fields=... → metrics has impressions, likes, saves, comments_count
          Facebook: mock /post_id/insights → metrics has impressions, likes, shares, comments
          All adapters:
          - test_404_returns_post_deleted_signal: mock 404 → adapter returns POST_DELETED sentinel
          - test_429_with_retry_after: mock 429 with Retry-After: 30 header → adapter waits 30s, retries once
          - test_auth_error_raises_immediately: mock 401 → raises without retry

      - title: "Write integration tests for AnalyticsPoller scheduling and 3-snapshot lifecycle"
        task_type: test
        description: >
          tests/flex/agents/analytics/test_analytics_poller.py:
          - test_schedule_creates_3_rows: AnalyticsPoller.schedule(publish_record) → 3 rows in polling_schedule
          - test_schedule_times_correct: poll_1=published_at+1h, poll_2=+24h, poll_3=+7d
          - test_run_polls_due_records: row with scheduled_at <= now, status='pending' → adapter.poll called
          - test_run_skips_future_records: row scheduled 2h from now → not polled
          - test_post_deleted_cancels_remaining: adapter returns POST_DELETED → publish_record marked, remaining 2 rows status='cancelled'
          - test_completed_poll_not_reprocessed: status='completed' row → adapter not called again
          tests/flex/store/test_metrics_store.py:
          - test_insert_and_get_by_publish_record: full metrics dict round-trip
          - test_get_latest_returns_highest_poll_number: 3 snapshots → get_latest returns poll_number=3
          - test_get_all_for_platform: 10 records across platforms → returns correct platform subset

  - feature_name: "Analytics Dashboard and Pattern Detection"
    analysis: >
      PatternDetectionEngine is pure function — ideal for property-based testing.
      The 5-post minimum threshold test must cover: exactly 4 (returns PatternInsufficient),
      exactly 5 (returns PatternResult). The engagement_rate formula test must confirm:
      (likes + comments + shares) / impressions, and handle impressions=0 (no division by zero).
      Pattern algorithms must be tested with controlled data where the expected winner
      is known (e.g., 5 Tuesday posts with 2x engagement of other days → best_day=Tuesday).
    tasks:
      - title: "Write unit tests for PatternDetectionEngine with controlled metric fixtures"
        task_type: test
        description: >
          tests/flex/agents/analytics/test_pattern_detection_engine.py:
          - test_insufficient_data_at_4_posts: 4 snapshots → PatternInsufficient(current_count=4)
          - test_sufficient_data_at_5_posts: 5 snapshots → PatternResult returned (not PatternInsufficient)
          - test_best_time_window_detected: 5 Tuesday posts with 200 avg engagement, 5 Thursday with 80 → best_day=Tuesday
          - test_engagement_rate_formula: 100 likes + 20 comments + 30 shares / 1000 impressions = 0.15
          - test_engagement_rate_zero_impressions: impressions=0 → engagement_rate=0 (no ZeroDivisionError)
          - test_top_topic_detected: 3 posts about 'AI' with 180 avg eng, 2 posts about 'Career' with 60 avg → top_topic contains 'AI'
          - test_insights_max_3: PatternResult → max 3 insight strings returned
          - test_pattern_insufficient_message: message includes current count and required count

  - feature_name: "Content Recommendation Engine"
    analysis: >
      RecommendationEngine makes a Claude API call — must be mocked in tests.
      confidence_score formula must be tested at boundaries: n=20 posts → score capped at 1.0,
      n=5 posts, high engagement delta → score < 1.0 but > 0.4 (should be visible, not low-confidence).
      The cross-stream integration test: get_for_ideation(n=2) must return the top-2 by confidence,
      not just the first 2 inserted.
    tasks:
      - title: "Write unit tests for RecommendationEngine confidence scoring and ideation integration"
        task_type: test
        description: >
          tests/flex/agents/analytics/test_recommendation_engine.py:
          - test_insufficient_data_returns_empty: PatternInsufficient → RecommendationEngine returns []
          - test_generates_3_to_5_recommendations: mock LLM → 3-5 Recommendation objects returned
          - test_confidence_score_capped_at_1: n=25 posts, high delta → confidence_score=1.0
          - test_confidence_score_below_threshold: n=5, moderate delta → confidence_score < 0.4 → marked 'Low confidence'
          - test_recommendations_upserted_by_platform: generate() twice for same platform → store has 1 set (not 2 accumulated)
          - test_get_for_ideation_returns_top_2_by_confidence: 5 recs with varied confidence → top 2 returned
          - test_low_confidence_still_shown: confidence < 0.4 → Recommendation returned but confidence_level='low'

edge_cases:
  - "Platform API changes response format (field renamed): adapter returns empty metrics dict — MetricsSnapshot stored with empty metrics, not crash"
  - "All 3 poll slots complete but engagement is 0 (post got no views): PatternDetectionEngine receives valid 0-engagement data — must not skip these posts in patterns (they're signal too)"
  - "RecommendationEngine generates recommendation for a platform with only 1 post type (user only posts threads on X): best_format has only 1 data point — confidence_score penalized accordingly"
  - "AnalyticsPoller.run() called while previous run is still polling (overlap): polling_schedule rows must be marked 'in_progress' to prevent duplicate polling"

integration_notes: >
  Cross-stream contract — publishing to analytics:
  publish_records_store.get_published_without_analytics() must correctly identify records
  needing their first poll. QA writes contract test spanning both streams:
  (1) insert PublishRecord (simulating publishing-orchestration output),
  (2) assert get_published_without_analytics() includes it,
  (3) run AnalyticsPoller.schedule() + run(),
  (4) assert MetricsSnapshot exists for the record,
  (5) assert get_published_without_analytics() no longer includes it.

  Cross-stream contract — analytics to ideation (Recommendation cross-stream):
  RecommendationEngine.get_for_ideation(n=2) must return serializable data that
  'flex ideation list' can display without importing analytics modules.
  QA verifies: Recommendation objects are JSON-serializable and ideation CLI
  can display them using only the public fields (topic_suggestion, format_suggestion,
  timing_suggestion, rationale).

completed: true
